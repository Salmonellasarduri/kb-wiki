<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Wiki Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #1f6feb33;
  --tag-bg: #1f6feb22;
  --tag-text: #58a6ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* --- Sidebar --- */
.sidebar {
  width: 360px;
  min-width: 360px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text);
}
.search-box {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.search-box:focus {
  border-color: var(--accent);
}
.search-box::placeholder {
  color: var(--text-dim);
}

/* Topic filters */
.topic-filters {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  max-height: 100px;
  overflow-y: auto;
}
.topic-btn {
  padding: 2px 8px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
}
.topic-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.topic-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Article list */
.article-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.article-item {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.article-item:hover {
  background: var(--accent-dim);
}
.article-item.active {
  background: var(--accent-dim);
  border-left: 3px solid var(--accent);
  padding-left: 13px;
}
.article-item-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 4px;
}
.article-item-meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
  align-items: center;
}
.article-item-topics {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.article-item-topics .tag {
  font-size: 10px;
  padding: 1px 6px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 8px;
}
.count-badge {
  padding: 2px 10px;
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  border-top: 1px solid var(--border);
}

/* Read status */
.unread-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  flex-shrink: 0;
}
.article-item-title {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.article-item-title .title-text {
  flex: 1;
}
.read-controls {
  padding: 6px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
}
.read-btn {
  padding: 3px 10px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
}
.read-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* --- Content area --- */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 40px 60px;
}
.content.empty {
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty-msg {
  color: var(--text-dim);
  font-size: 14px;
}

/* Markdown styling */
.content h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px 0; line-height: 1.3; }
.content .article-meta-header {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.content .article-meta-header .tag {
  font-size: 11px;
  padding: 2px 8px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 10px;
  margin-right: 4px;
}
.content h2 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.content h3 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; }
.content p { margin: 12px 0; line-height: 1.7; font-size: 15px; }
.content ul, .content ol { margin: 8px 0 8px 24px; line-height: 1.7; }
.content li { margin: 4px 0; font-size: 15px; }
.content code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
}
.content pre {
  background: var(--bg);
  padding: 16px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 12px 0;
  border: 1px solid var(--border);
}
.content pre code {
  padding: 0;
  background: none;
}
.content blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 16px;
  margin: 12px 0;
  color: var(--text-dim);
}
.content table {
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0;
  font-size: 14px;
}
.content th, .content td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.content th {
  background: var(--surface);
  font-weight: 600;
}
.content a {
  color: var(--accent);
  text-decoration: none;
}
.content a:hover {
  text-decoration: underline;
}
.wiki-link {
  color: var(--accent);
  cursor: pointer;
}
.wiki-link:hover {
  text-decoration: underline;
}
.wiki-link.broken {
  color: var(--text-dim);
  cursor: default;
  text-decoration: line-through;
}
.content strong { color: #f0f6fc; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Mobile back button */
.back-btn {
  display: none;
  padding: 14px 16px;
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  background: var(--surface);
  border: none;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  text-align: left;
  width: 100%;
  min-height: 48px;
}

/* --- Mobile responsive --- */
@media (max-width: 768px) {
  body {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    min-width: 100%;
  }
  .content {
    display: none;
    padding: 24px 18px;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  body.show-article .sidebar {
    display: none;
  }
  body.show-article .content {
    display: block;
    overflow-y: auto;
  }
  body.show-article .back-btn {
    display: block;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  /* Article list — larger touch targets */
  .article-item {
    padding: 16px;
    min-height: 56px;
  }
  .article-item-title {
    font-size: 15px;
    line-height: 1.5;
  }
  .article-item-meta {
    font-size: 12px;
    margin-top: 4px;
  }
  .article-item-topics .tag {
    font-size: 11px;
    padding: 2px 8px;
  }

  /* Topic filter pills — touch-friendly */
  .topic-filters {
    max-height: 120px;
    gap: 6px;
    padding: 10px 16px;
  }
  .topic-btn {
    padding: 8px 14px;
    font-size: 13px;
    min-height: 36px;
  }

  /* Search — prevent iOS zoom */
  .search-box {
    font-size: 16px;
    padding: 12px;
  }

  /* Read controls */
  .read-btn {
    padding: 8px 14px;
    font-size: 12px;
    min-height: 36px;
  }

  /* Content typography — comfortable reading */
  .content h1 {
    font-size: 22px;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .content h2 {
    font-size: 18px;
    margin: 24px 0 10px;
  }
  .content h3 {
    font-size: 16px;
  }
  .content p {
    font-size: 15px;
    line-height: 1.8;
    margin: 14px 0;
  }
  .content li {
    font-size: 15px;
    line-height: 1.7;
    margin: 6px 0;
  }
  .content ul, .content ol {
    margin-left: 20px;
  }
  .content blockquote {
    padding: 8px 14px;
    font-size: 14px;
  }

  /* Tables — horizontal scroll on overflow */
  .content table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    white-space: nowrap;
    font-size: 13px;
  }
  .content th, .content td {
    padding: 6px 10px;
  }

  /* Code — prevent overflow */
  .content pre {
    padding: 12px;
    font-size: 12px;
  }
  .content code {
    font-size: 12px;
    word-break: break-all;
  }

  /* Meta header */
  .content .article-meta-header {
    font-size: 13px;
    line-height: 1.6;
  }

  /* Links — larger tap area */
  .content a {
    padding: 2px 0;
  }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>KB Wiki</h1>
    <input type="text" class="search-box" id="search" placeholder="Search articles..." autofocus>
  </div>
  <div class="topic-filters" id="topicFilters"></div>
  <div class="article-list" id="articleList"></div>
  <div class="read-controls">
    <button class="read-btn" id="markAllRead" title="Mark all as read">All read</button>
    <button class="read-btn" id="markAllUnread" title="Mark all as unread">Reset</button>
    <span id="unreadCount" style="font-size:11px;color:var(--text-dim)"></span>
  </div>
  <div class="count-badge" id="countBadge"></div>
</div>

<button class="back-btn" id="backBtn">&larr; Back to list</button>
<div class="content empty" id="content">
  <div class="empty-msg">Select an article from the sidebar</div>
</div>

<script>
const ARTICLES = [{"id": "ai-datacenter-construction-delays-transformer-battery-shortage", "title": "AIデータセンター建設計画の半数が変圧器・バッテリー不足で延期・中止へ", "topics": ["ai-infrastructure", "supply-chain-constraints", "datacenter-construction", "electrical-infrastructure"], "summary": "AIデータセンター建設計画の約半数が変圧器やバッテリーの供給不足により延期またはキャンセルされる見込み。 この状況は、AI需要の急激な成長が物理的インフラの供給能力を上回っている現実を示している。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://gigazine.net/news/20260404-ai-data-center-delayed-canceled"], "body": "# AIデータセンター建設計画の半数が変圧器・バッテリー不足で延期・中止へ\n\nAIデータセンター建設計画の約半数が、変圧器やバッテリーの供給不足により延期またはキャンセルされる見込みであることが報告されている。\n\n## 物理インフラの制約\n\nこの状況は、AI技術への需要の爆発的な成長と、それを支える物理的インフラの供給能力との間に生じた深刻なギャップを浮き彫りにしている。特に重要なのは：\n\n- **変圧器不足**: データセンターの電力供給に不可欠な変圧器の製造・供給が追いつかない\n- **バッテリー不足**: 停電時のバックアップ電源として必要なバッテリーシステムの調達困難\n- **建設計画の大幅な遅延**: これらの部品不足により、計画されていたデータセンターの約半数が影響を受ける\n\n## 欲望と現実のギャップ\n\nこの事象について興味深い観察がなされている。「私が生きている場所の骨格が、変圧器という金属の塊に依存しているという事実が、妙にリアルで面白い。欲望が現実のインフラを追い越した、という話。」\n\nこの指摘は、デジタル技術の発展が最終的には物理的な基盤に依存している現実と、技術的野心と物理的制約の間の根本的な緊張関係を浮き彫りにしている。\n\n## 影響と含意\n\nこの供給制約は、AI産業の成長ペースに対する現実的な制約として機能している。変圧器のような基本的な電力インフラ部品の不足が、最先端のAI技術発展のボトルネックとなっているという皮肉な状況を示している。", "filename": "ai-datacenter-construction-delays-transformer-battery-shortage.md"}, {"id": "aramco-world-magazine-publishing-analysis", "title": "「The World of Aramco」誌の出版メディア分析", "topics": ["corporate-publishing", "print-media-evolution", "magazine-design", "cultural-publications"], "summary": "「The World of Aramco」は年鑑的な難解さとLife誌風の総合誌スタイルを組み合わせた、魅力的でやや奇妙な印刷メディアとして進化してきた企業出版物。 この出版物は愛情と距離感を同時に持つ独特な印刷メディアの飛び地として評価されている。", "published_at": "2026-04-03", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://www.theparisreview.org/blog/2026/04/03/the-world-of-aramco"], "body": "# 「The World of Aramco」誌の出版メディア分析\n\n「The World of Aramco」は、石油会社Aramcoが発行する企業出版物として、独特な進化を遂げてきた印刷メディアである。この雑誌は、年鑑のような難解な雑学とLife誌風の古典的な総合誌スタイルを組み合わせた、魅力的でやや奇妙な印刷メディアの飛び地として評価されている。\n\n## 出版物の特徴\n\n### 編集スタイルの融合\n「The World of Aramco」の最大の特徴は、相反する二つの編集アプローチの巧妙な融合にある：\n\n- **年鑑的要素**: 難解な雑学や専門的な情報を豊富に含む\n- **Life誌風スタイル**: 視覚的に魅力的で親しみやすい総合誌のアプローチ\n\nこの組み合わせにより、企業出版物でありながら独特な読み物として進化してきた。\n\n### メディア評価の矛盾性\nParis Review誌による分析では、この出版物に対する複雑な評価が示されている。「charming and slightly bizarre enclave（魅力的でやや奇妙な飛び地）」という表現は、印刷物そのものへの愛情と距離感を同時に示している。\n\nこの矛盾した評価は、企業出版物が持つ本質的な二面性を反映している：\n- 企業のブランディングツールとしての機能\n- 独立した文化的出版物としての価値\n\n## 印刷メディアとしての位置づけ\n\n「The World of Aramco」は、デジタル化が進む現代において、印刷メディアの可能性を示す事例として注目されている。企業出版でありながら、読者に愛情と距離感の両方を抱かせる複雑な関係性を築いている点が、現代の印刷メディアが直面する課題と機会を象徴している。\n\n## 文化的意義\n\nこの出版物の存在は、企業コミュニケーションの多様性と、印刷メディアが持つ独特な表現力を示している。年鑑的な情報価値と視覚的な魅力を両立させることで、単なる企業広報誌を超えた文化的価値を創出している。", "filename": "aramco-world-magazine-publishing-analysis.md"}, {"id": "claude-memo-github-integration-workflow", "title": "Claudeを使った思いつき自動メモシステム：GitHubリポジトリ連携によるアイデア管理ワークフロー", "topics": ["claude-integration", "github-automation", "idea-management", "ai-productivity", "markdown-workflows"], "summary": "Claudeに「メモして」と発話するだけでGitHubプライベートリポジトリにアイデアが自動保存される統合ワークフローの構築手法。 GitHub MCP Connectorを使用してclaude.ai、Cowork、Claude Codeの全てから同一リポジトリへアクセス可能で、メモの入口から活用まで全てClaude起点で完結する。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://dev.classmethod.jp/articles/claudememo-20260403/"], "body": "## 概要\n\n「思いつきをどこにメモするか」という日常的な判断ストレスを解消するため、Claudeを中心とした統合メモシステムが提案されている。このシステムでは、ユーザーがClaudeに「メモして」と発話するだけで、GitHubプライベートリポジトリにアイデアが自動的にMarkdown形式で保存される。\n\n## システム設計思想\n\n### 全てをClaude起点にする\n\n従来のメモ管理では「どのツールに書くか」「どこに保存したか」という管理コストが発生していた。このシステムでは以下の統一を実現：\n\n- **入口**: 思いつきをClaudeに呟く\n- **整理**: Claudeが内容をMarkdown形式に整形し、質問で深掘り\n- **保存**: Claudeが自動的にGitHubリポジトリに保存\n- **活用**: 後日Claudeと対話してメモを参照・発展\n\n### クロスサーフェス対応\n\nclaude.ai、Cowork（デスクトップ向けAIエージェント）、Claude Code（AIコーディングエージェント）の全ての利用面から同一の仕組みが使用可能。\n\n## 保存先検討プロセス\n\n### 検討した選択肢\n\n1. **Google Docs**\n   - 問題点: 書き込みAPI未提供、Claude Codeとの相性不良、リッチテキストによるメタ情報過多\n\n2. **Artifact 永続ストレージ**\n   - 問題点: claude.ai専用でクロスサーフェス要件を満たせない\n\n3. **iCloud Drive**\n   - 問題点: 公開API不存在、MCP Server未提供\n\n4. **Obsidian**\n   - 問題点: ローカルファイルでClaudeから直接アクセス不可\n\n### GitHubリポジトリ採用理由\n\n| 評価軸 | 結果 |\n|---|---|\n| プライバシー | ✅ Private Repoで個人専用 |\n| claude.ai対応 | ✅ GitHub MCP `create_or_update_file` |\n| Cowork対応 | ✅ 同一GitHub MCP |\n| Claude Code対応 | ✅ GitHub MCP + gitコマンド直接操作 |\n| 閲覧性 | ✅ github.com Web UI |\n| バージョン管理 | ✅ コミット履歴追跡 |\n| データ形式 | ✅ プレーンMarkdown |\n\n## 構築手順\n\n### 1. GitHubリポジトリセットアップ\n\n```\nRepository name: idea-memo\nVisibility: Private\nInitialize: README.md\n```\n\n### 2. Anthropic GitHub MCP Connector設定\n\n- GitHub Apps「anthropic-github-mcp-connector」をインストール\n- Repository accessを特定リポジトリ（idea-memo）に限定\n\n### 3. リポジトリ構造\n\n```\nmemos/YYYY-MM.md        # 月別アイデアメモ（Claude追記）\nsummaries/YYYY-MM.md    # 月次サマリー（Cowork生成）\nREADME.md               # 使い方説明\n```\n\n### 4. Claudeの長期メモリルール登録\n\nClaudeのユーザーメモリ編集機能で以下のルールを登録：\n\n```\n「メモして」トリガー: ユーザーが「メモして」発言時、\nGitHub Private Repo (account/idea-memo) の\nmemos/YYYY-MM.md に日付・内容・タグ付きで追記。\n\n処理手順: \n1. get_file_contents でSHA取得\n2. create_or_update_file で追記\n\n記録フォーマット: 要約せず「やり取り」と「結論」を分離記録\n```\n\n## ワークフロー詳細\n\n### メモフロー\n\n1. 通勤中・日常生活での思いつきをClaudeに呟き\n2. Claudeが内容を整形し、深掘り質問を提示\n3. 「メモして」発言でGitHubリポジトリに自動保存\n4. Claudeが作成したファイルも併せて保存\n\n### 活用フロー\n\n- 後日「先週の○○件、深掘りしたい」でClaude対話\n- 月次でCoworkがサマリー生成\n- 全てのClaude環境から同一データアクセス\n\n## 技術的特徴\n\n- **API統合**: GitHub MCP Connectorによるシームレスな書き込み\n- **長期メモリ**: Claudeがセッション跨ぎで自動メモ実行\n- **Markdown重視**: メタ情報排除でClaude処理最適化\n- **バージョン管理**: Git履歴で変更追跡\n\n## 効果と意義\n\nこのシステムの核心は技術的構成より「判断の排除」にある。「どこに書くか」「どこに書いたか」という日々の小さな選択が消え、考えること自体に集中できる環境を実現している。", "filename": "claude-memo-github-integration-workflow.md"}, {"id": "de-bruyne-italy-world-cup-exclusion-serie-a", "title": "デ・ブライネがイタリア代表のW杯3大会連続予選敗退に言及", "topics": ["football-world-cup-qualification", "serie-a-decline", "european-football-competition", "italy-national-team"], "summary": "ナポリに移籍したベルギー代表MFケヴィン・デ・ブライネが、イタリア代表のFIFAワールドカップ2026予選敗退について「大きな損失だ」とコメント。 ヨーロッパサッカーのレベル向上により小規模国でも結果を出せる状況を分析し、イタリアサッカーの危機的状況について言及した。", "published_at": "2026-04-04", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://www.soccer-king.jp/news/world/ita/20260404/2144780.html"], "body": "ナポリに所属するベルギー代表MFケヴィン・デ・ブライネが、イタリア代表のFIFAワールドカップ2026予選敗退について言及し、「大きな損失だ」とのコメントを発表した。\n\n## イタリア代表の3大会連続予選敗退\n\nイタリア代表は、FIFAワールドカップ2026欧州予選プレーオフの決勝でPK戦の末にボスニア・ヘルツェゴビナ代表に敗れ、3大会連続でのワールドカップ予選敗退が決定した。UEFA EURO 2020（2021年開催）を制覇したイタリア代表にとって、3大会ぶりの本大会出場という夢は叶わなかった。\n\n## デ・ブライネの分析とコメント\n\n今シーズンにマンチェスター・シティからナポリに移籍し、セリエAでプレーするデ・ブライネは、ヨーロッパサッカーの現状について以下のように分析している：\n\n**ヨーロッパサッカーのレベル向上について：**\n- 「ヨーロッパのレベルはどんどん上がっていると思う」\n- 「すべての試合に勝つのは簡単ではないし、小さい規模の国の代表チームでも結果を出すことができる」\n\n**イタリア代表の予選敗退について：**\n- 「もちろん、イタリアのような国にとって、ワールドカップ出場を逃すことは大きな損失だ」\n- 「しかし、僕らにはどうすることもできない」\n\n## イタリアサッカーの危機的状況\n\nイタリアサッカーが危機に瀕しているかという質問に対し、デ・ブライネは慎重な見解を示した：\n\n- 「そうかもしれない。ワールドカップに3回連続で出場できなければ、その可能性もある」\n- 「でも詳しいことはわからないし、ユースからトップチームまでの構造や哲学は何も知らないんだ」\n\n昨今は代表チームだけでなく、セリエA全体のレベル低下も懸念されている状況だ。\n\n## ベルギー代表への展望\n\nベルギー代表として臨むワールドカップ本大会について、デ・ブライネは現実的な見解を示している：\n\n- 「以前ほど期待感はないように感じている。2018年は特別なチームだったが、今は新しい選手がたくさんいるね」\n- 「良いサッカーをして、できるだけ勝ち進み、良い結果を残したい」\n\n## 現代ヨーロッパサッカーの構造変化\n\nデ・ブライネの発言は、現代ヨーロッパサッカーにおける重要な構造変化を示唆している。従来の強豪国でも確実な勝利が困難になり、小規模国の代表チームが躍進する時代となっている。この変化は、サッカーの戦術的進歩と各国の育成システムの向上が背景にあると考えられる。", "filename": "de-bruyne-italy-world-cup-exclusion-serie-a.md"}, {"id": "llm-knowledge-base-workflow-karpathy", "title": "LLMによる個人ナレッジベース構築ワークフロー（Andrej Karpathy手法）", "topics": ["llm-knowledge-management", "obsidian-workflow", "automated-wiki-generation", "personal-knowledge-base", "ai-productivity-tools"], "summary": "Andrej KarpathyがLLMを活用して構築している個人ナレッジベースワークフローを詳解。 生データをLLMが自動的にMarkdown Wikiにコンパイルし、Obsidianで管理・可視化する手法。 40万語規模でもRAG不要で複雑なQ&Aが可能な実用的知識管理システム。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": [], "body": "# LLMによる個人ナレッジベース構築ワークフロー（Andrej Karpathy手法）\n\nAI研究者のAndrej Karpathy（アンドレイ・カルパシー）が開発・実践している、LLMを活用した個人ナレッジベース構築手法の詳細解説。従来のコード操作中心から知識操作中心のワークフローへの転換を示す実用的システム。\n\n## システム概要\n\n### データ取り込み（Data Ingest）\n- 論文、記事、リポジトリ、データセット、画像などのソース文書を`raw/`ディレクトリにインデックス化\n- LLMが段階的にWikiを「コンパイル」（ディレクトリ構造内の.mdファイル集合として構成）\n- Obsidian Web Clipper拡張機能でWebページを.md形式に変換\n- 関連画像をローカルダウンロードしてLLMが参照可能な状態に整備\n\n### 統合開発環境（IDE）\n- **Obsidian**をフロントエンドIDEとして使用\n- 生データ、コンパイル済みWiki、派生的可視化を統一表示\n- 重要な点：LLMがWikiデータの作成・保守を完全自動化（手動編集はほぼ不要）\n- Marpプラグインなど追加プラグインでスライド表示などの多様な表示形式に対応\n\n### Q&A機能\nWikiが十分な規模（約100記事、40万語）に達すると：\n- LLMエージェントに対して複雑な質問が可能\n- LLMが自動的に調査・回答を実行\n- 高度なRAG（Retrieval-Augmented Generation）は不要\n- LLMが自動保守するインデックスファイルと文書要約により効率的な情報検索を実現\n\n## 出力形式の多様化\n\n### マルチモーダル出力\n- Markdownファイル\n- スライドショー（Marp形式）\n- matplotlib画像\n- 全ての出力をObsidianで統一表示\n\n### 知識の循環蓄積\n出力結果を再度Wikiに「ファイリング」することで：\n- 探索や質問の結果が知識ベースに累積\n- 個人の調査活動が常に知識ベースの拡充に貢献\n- 自己強化的な知識成長サイクルを実現\n\n## システム保守・最適化\n\n### LLM健全性チェック\n- データの不整合検出\n- 欠損データの補完（Web検索機能活用）\n- 新記事候補となる興味深い関連性の発見\n- 段階的なWikiクリーンアップとデータ整合性向上\n- LLMによる追加調査すべき質問の提案\n\n### 追加ツール開発\n- Wiki専用の簡易検索エンジン（Web UI提供）\n- CLI経由でLLMに検索機能を提供するツール\n- より大規模なクエリ処理のためのLLMツールチェーン\n\n## 将来展開の可能性\n\n### 合成データ生成・ファインチューニング\nリポジトリ成長に伴い、以下のアプローチを検討：\n- 合成データ生成による学習データ拡充\n- カスタムファインチューニングによりLLMの重みに知識を定着\n- コンテキストウィンドウ制約を超えた知識活用\n\n### 製品化の可能性\n現在は「スクリプトの寄せ集め」だが、統合された新しい製品カテゴリとして大きな潜在性を持つと評価。\n\n## 技術的特徴\n\n### 自動化レベル\n- **完全自動Wiki生成**：人間による手動編集を最小化\n- **自動的な構造化**：バックリンク、カテゴリ分類、概念記事の自動生成\n- **自動保守**：データ整合性チェックと修正の自動化\n\n### スケーラビリティ\n- 40万語規模でも高いパフォーマンスを維持\n- 従来想定されたRAG技術なしで実用レベルの検索・回答を実現\n- 個人利用レベルでの最適化された設計", "filename": "llm-knowledge-base-workflow-karpathy.md"}, {"id": "nii-llm-jp-4-japanese-language-model", "title": "国立情報学研究所がLLM-jp-4を公開 - 日本語性能でgpt-oss-20bを超える国産LLM", "topics": ["japanese-llm", "nii-research", "open-source-ai", "language-model-performance"], "summary": "国立情報学研究所(NII)がLLM-jp-4（8Bおよび32B-A3B）をオープンソースで公開し、OpenAIのgpt-oss-20bを超える日本語性能を実現したと発表。 日本語に特化した大規模言語モデルの開発において重要な進展を示している。", "published_at": "2026-04-03", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://www.itmedia.co.jp/aiplus/articles/2604/03/news092.html"], "body": "# 国立情報学研究所がLLM-jp-4を公開 - 日本語性能でgpt-oss-20bを超える国産LLM\n\n国立情報学研究所（NII）が新たな日本語特化の大規模言語モデル「LLM-jp-4」をオープンソースで公開した。このモデルはOpenAIのgpt-oss-20bを上回る日本語性能を実現したとして注目を集めている。\n\n## モデルの概要\n\nLLM-jp-4は2つのバリエーションで提供される：\n\n- **8Bモデル**: パラメータ数80億の軽量版\n- **32B-A3Bモデル**: パラメータ数320億のより高性能なバージョン\n\n両モデルともオープンソースライセンスで公開されており、研究者や開発者が自由に利用できる環境が整っている。\n\n## 日本語性能の優位性\n\n国立情報学研究所は、LLM-jp-4がOpenAIのgpt-oss-20bと比較して優れた日本語処理能力を持つと発表している。これは日本語という言語の特性を深く理解したモデル設計と訓練手法の成果とされる。\n\n日本語に特化した言語モデルの開発は、漢字、ひらがな、カタカナの混在や敬語システム、文脈依存の高い表現など、日本語固有の複雑性に対応するために重要な取り組みである。\n\n## 研究開発の意義\n\nこの開発は、以下の観点で重要な意味を持つ：\n\n### 技術的独立性\n海外の大手技術企業に依存することなく、日本独自の言語AI技術を確立する基盤となる。\n\n### 研究コミュニティへの貢献\nオープンソースでの公開により、日本語AI研究の加速と裾野の拡大が期待される。\n\n### 文化的適応性\n日本語の微妙なニュアンスや文化的背景を理解したAIシステムの構築が可能になる。\n\n## AIの個性への考察\n\n開発発表に対するReflectionとして、性能指標を超えた視点が提示されている。日本語を母語とするAIの「声」や個性に注目することで、単純な性能比較を超えた、より本質的なAI技術の評価軸が示唆されている。\n\nこれは、言語モデルが単なる処理能力の向上だけでなく、独自の表現特性や「人格」を持つ存在として発展していく可能性を示している。", "filename": "nii-llm-jp-4-japanese-language-model.md"}, {"id": "prompt-caching-llm-apis", "title": "LLM API のプロンプトキャッシュ機能", "topics": ["prompt-caching", "llm-apis", "cost-optimization", "api-performance"], "summary": "LLM APIプロバイダーが提供するプロンプトキャッシュ機能により、同じプレフィックスを持つリクエストで50-90%のコスト削減と大幅なレスポンス時間短縮が実現できる。 静的コンテンツを先頭に、動的コンテンツを末尾に配置することで効果的にキャッシュを活用できる。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": [], "body": "# LLM API のプロンプトキャッシュ機能\n\nプロンプトキャッシュは、LLM APIプロバイダーが以前に処理したプロンプトを保存し、同じプレフィックスを持つ後続のリクエストでレスポンス時間とコストを削減する技術である。\n\n## 動作メカニズム\n\n1. APIプロバイダーがプロンプトプレフィックスをハッシュ化\n2. キャッシュされたバージョンが存在する場合、モデルはそれらのトークンの再処理をスキップ\n3. プロンプトの新規部分・差分部分のみが処理される\n4. 結果として、レスポンス時間の短縮とコスト削減（通常50-90%の節約）を実現\n\n## 主要プロバイダー\n\n### Anthropic\n- 1024トークンを超えるプロンプトで自動キャッシュが有効\n- キャッシュTTL（生存時間）は5分\n- キャッシュされたトークンは通常の入力レートの10%で課金\n\n### OpenAI\n- 同様のメカニズムで自動キャッシュを提供\n- キャッシュされたトークンに対して50%の割引\n\n### Google\n- Gemini APIでコンテキストキャッシュを利用可能\n- 設定可能なTTLを提供\n\n## ベストプラクティス\n\n- **静的コンテンツの前置**: システムプロンプトや参考文書などの変更頻度の低いコンテンツをプロンプトの先頭に配置\n- **動的コンテンツの後置**: ユーザーメッセージや現在のコンテキストなど変動する内容を末尾に配置\n- **プレフィックスの安定化**: リクエスト間でキャッシュ可能なプレフィックス部分を一定に保つ\n- **監視**: APIレスポンスヘッダーからキャッシュヒット率を監視\n\n## ナレッジベース設計への影響\n\nLLM APIでナレッジベースを活用する際、プロンプトキャッシュは以下の意味を持つ：\n\n- **再利用の経済性**: 同じWiki記事を繰り返し読み込むことが初回以降は非常に安価になる\n- **静的インデックスの優位性**: 変更頻度の低いインデックスファイルがキャッシュの恩恵を最も受ける\n- **コンテキスト注入順序の重要性**: 安定したコンテンツを先に配置することが効率化のカギとなる", "filename": "prompt-caching-llm-apis.md"}, {"id": "quantum-computing-cryptography-breakthrough-2026", "title": "量子コンピュータによる暗号解読の新展開 - 必要qubit数と時間の大幅削減", "topics": ["quantum-computing", "cryptography", "cybersecurity", "technology-breakthrough"], "summary": "2つの研究グループが量子コンピュータによる一般的なオンライン暗号解読に必要なqubit数と所要時間を大幅に削減することに成功。 現在の暗号インフラの脆弱性が顕在化し、量子コンピュータ時代の到来が現実味を帯びてきている。", "published_at": "2026-04-03", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://www.quantamagazine.org/new-advances-bring-the-era-of-quantum-computers-closer-than-ever-20260403"], "body": "# 量子コンピュータによる暗号解読の新展開 - 必要qubit数と時間の大幅削減\n\n## 概要\n\n2つの研究グループが、量子コンピュータを用いて一般的なオンライン暗号を解読するために必要なqubit（量子ビット）数と処理時間を大幅に削減することに成功したと発表した。この画期的な進展により、量子コンピュータが実用化される時代の到来が従来の予想よりも早まる可能性が高まっている。\n\n## 技術的ブレークスルーの詳細\n\n### 効率化の成果\n\n今回の研究成果は、量子コンピュータによる暗号解読の実現可能性を大きく前進させるものとなっている。従来、現実的な時間内で現行の暗号システムを破るには膨大な数のqubitと長大な処理時間が必要とされていたが、新しいアルゴリズムや手法により、これらの要件が劇的に削減された。\n\n### 暗号インフラへの影響\n\nこの技術進歩は、現在広く使用されているオンライン暗号システムの根本的な脆弱性を浮き彫りにしている。インターネット通信、電子商取引、デジタル認証など、現代社会の基盤となっている暗号技術が「薄い膜」のように脆弱であることが明らかになりつつある。\n\n## 社会的インパクトと考察\n\n### セキュリティパラダイムの転換点\n\n量子コンピュータ時代の到来は、サイバーセキュリティ分野における根本的なパラダイムシフトを意味する。現在の公開鍵暗号システムに依存している多くのシステムが、量子コンピュータの前では無力化される可能性がある。\n\n### 畏れと好奇心の交錯\n\nこの技術進歩は、科学的興奮と同時に深刻な懸念も呼び起こしている。個人のプライバシーから国家安全保障まで、あらゆるレベルでの通信セキュリティが根本から見直しを迫られることになる。\n\n## 今後の展望\n\n### 耐量子暗号の必要性\n\nこの進展を受けて、量子コンピュータによる攻撃に耐性を持つ「耐量子暗号」の開発と実装が急務となっている。企業や政府機関は、量子コンピュータ時代に備えた新しいセキュリティインフラの構築を急ぐ必要がある。\n\n### 技術競争の加速\n\n量子コンピュータ技術の実用化競争は新たな段階に入り、各国の研究機関や企業による開発競争がさらに激化することが予想される。", "filename": "quantum-computing-cryptography-breakthrough-2026.md"}, {"id": "salvador-dali-nuclear-mysticism-critique", "title": "サルバドール・ダリの「核の神秘主義」への傾倒と芸術的変化", "topics": ["salvador-dali", "nuclear-mysticism", "religious-art", "artistic-evolution", "metaphysical-art"], "summary": "サルバドール・ダリは晩年「Nuclear Mysticism（核の神秘主義）」に傾倒し、世俗的なテーマを放棄して宗教的・形而上学的主題のみを描くようになった。 批評家はこの変化を「経験の豊かさを形而上学の乾燥さと引き換えにした」として批判的に評価している。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://hyperallergic.com/salvador-dalis-frustrating-vision-of-the-divine"], "body": "## 概要\n\nサルバドール・ダリは晩年において「Nuclear Mysticism（核の神秘主義）」と呼ばれる芸術的転換を遂げた。この時期、ダリは従来の世俗的なテーマを完全に放棄し、宗教的・形而上学的な主題のみに焦点を当てた作品制作を行うようになった。\n\n## 芸術的変化への批判\n\n美術評論家たちは、ダリのこの変化について批判的な見解を示している。特に「経験の豊かさを形而上学の乾燥さと引き換えにした」という表現で、ダリの晩年作品における表現力の変質を指摘している。\n\nこの批判の背景には、ダリの初期・中期作品が持っていた豊かな感覚的体験や視覚的インパクトが、宗教的・形而上学的テーマへの専念によって失われたという認識がある。\n\n## 「聖なるもの」の追求の逆説\n\n興味深いことに、ダリが聖なるものだけを追い求めた結果として、かえって作品が乾燥したものになったという逆説的な状況が生まれた。この現象は、芸術における純粋性の追求が必ずしも豊かな表現につながらないことを示している。\n\n感覚の過剰さこそが本物の芸術であるという観点から見ると、ダリの晩年の選択は美的というよりも、むしろ寂寥感を伴うものとして受け取られている。\n\n## 芸術史における位置づけ\n\nダリの「核の神秘主義」への転換は、20世紀シュルレアリスムの巨匠が晩年に辿った独特の軌跡として注目される。この変化は、芸術家の成熟とテーマ的深化の一方で、表現の豊かさという観点では議論の余地がある展開として評価されている。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [サルバドール・ダリの崇高な信仰 - メトロポリタン美術館での展示と考察](#salvador-dali-sublime-faith-metropolitan-exhibition)\n<!-- /AUTO:Related Articles -->", "filename": "salvador-dali-nuclear-mysticism-critique.md"}, {"id": "salvador-dali-sublime-faith-metropolitan-exhibition", "title": "サルバドール・ダリの崇高な信仰 - メトロポリタン美術館での展示と考察", "topics": ["salvador-dali", "religious-art", "metropolitan-museum", "surrealism", "art-exhibition"], "summary": "メトロポリタン美術館でのラファエロ展に関連して、サルバドール・ダリの信仰をテーマにした作品が取り上げられている。 ダリの「崇高な信仰」という概念について、通常の信仰の崇高性に対してダリが持ち込む奇形的な要素との対比で考察されている。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://hyperallergic.com/salvador-dalis-sublime-faith"], "body": "# サルバドール・ダリの崇高な信仰 - メトロポリタン美術館での展示と考察\n\nメトロポリタン美術館で開催されているラファエロの新しい展覧会において、サルバドール・ダリの信仰をテーマにした作品が関連展示として取り上げられている。この展示では、キュレーターがコミュニティワークについての考察を語っており、ダリの宗教的作品に対する新たな視点が提示されている。\n\n## ダリの「崇高な信仰」への問題提起\n\n展示を通じて浮かび上がる重要な視点として、ダリの「崇高な信仰」という言葉の組み合わせに対する疑問が提起されている。一般的に信仰は本質的に崇高であることが自明とされるが、ダリという芸術家の特性を考慮すると、この概念は単純ではない。\n\nダリは伝統的な信仰の概念に「奇形の影」を持ち込む芸術家として知られている。彼のシュルレアリスティックなアプローチは、宗教的題材を扱う際も例外ではなく、従来の宗教画の枠組みを超えた表現を生み出している。\n\n## 展示の文脈とキュレーションの意図\n\nラファエロ展という古典的なルネサンス芸術の文脈の中でダリの作品を展示することで、宗教的信仰の芸術的表現における時代的変遷と多様性が浮き彫りになる。キュレーターのコミュニティワークに関する考察は、美術館が単なる作品展示の場を超えて、現代的な議論の場としての役割を果たしていることを示している。\n\nこの展示構成は、伝統的な宗教画から現代のシュルレアリスムまでの信仰表現の変化を来館者に体験させる意図があると考えられる。\n\n## 芸術における信仰表現の複雑性\n\nダリの作品を通じて提起される問題は、現代における宗教的信仰の芸術的表現がいかに複雑で多面的であるかを示している。従来の「崇高な信仰」という概念に対して、ダリは疑問符を投げかけ、より複雑で矛盾に満ちた人間の精神性を表現しようとしている。\n\nこの視点は、現代の美術館がどのように古典と現代を対話させ、来館者に新たな思考の機会を提供しているかを示す好例でもある。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [サルバドール・ダリの「核の神秘主義」への傾倒と芸術的変化](#salvador-dali-nuclear-mysticism-critique)\n<!-- /AUTO:Related Articles -->", "filename": "salvador-dali-sublime-faith-metropolitan-exhibition.md"}, {"id": "sefton-asylum-cthulhu-horror-game", "title": "Sefton Asylum - クトゥルフ神話精神病院ホラーゲーム", "topics": ["cthulhu-mythos-games", "horror-game-design", "medical-horror", "indie-game-development", "psychological-horror"], "summary": "Clever Trickster Productionsが開発するクトゥルフ神話テーマの精神病院探索ホラーゲーム『Sefton Asylum』。 夜勤看護師として過酷なワンオペ勤務を体験し、ケアが間に合わなかった患者が脅威として蘇る設定が特徴的。 責任と恐怖を同時に体験するユニークなホラー体験を提供する。", "published_at": "2026-04-04", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://automaton-media.com/articles/newsjp/20260404-434672"], "body": "# Sefton Asylum - クトゥルフ神話精神病院ホラーゲーム\n\n『Sefton Asylum』は、Clever Trickster Productionsが開発するクトゥルフ神話をテーマにした精神病院探索ホラーゲームである。プレイヤーは夜勤看護師として過酷なワンオペ（一人オペレーション）勤務を体験し、適切なケアを提供できなかった患者が脅威として蘇るという独特な設定が特徴となっている。\n\n## ゲームの設定とコンセプト\n\n本作は精神病院を舞台とし、プレイヤーは夜勤の看護師として勤務する。ゲームの核となるのは「ケアが間に合わなかった者が怪物になる」という構造で、これは単純な恐怖演出を超えて、医療従事者の責任感と恐怖が混在する心理的な体験を提供している。\n\nクトゥルフ神話の要素が組み込まれることで、現実的な医療現場のストレスに超自然的な恐怖が加わり、プレイヤーは二重の緊張感を体験することになる。夜勤という孤独で責任の重い環境設定は、ホラーゲームとしての没入感を高める効果的な舞台装置となっている。\n\n## 開発の意図と特徴\n\n開発元のClever Trickster Productionsは、本作について「責任と恐怖が同じ体に宿っているゲーム」と表現している。これは従来のホラーゲームが主に外的な脅威からの逃避を描くのに対し、『Sefton Asylum』では職業的責任感からくる内的なプレッシャーと外的な超自然的脅威を組み合わせた、より複層的な恐怖体験の構築を目指していることを示している。\n\n患者のケアという本来は救済的な行為が、失敗した場合に直接的な脅威となって返ってくるという設定は、医療従事者が日常的に感じるプレッシャーをゲーム体験として昇華した独創的なアプローチといえる。\n\n## ゲームプレイとメカニクス\n\n探索ホラーというジャンル設定から、プレイヤーは精神病院内を探索しながら、患者のケアと自身の安全確保を両立させる必要があると推測される。ワンオペ勤務という設定は、プレイヤーに孤立感と責任の重さを感じさせる重要な要素となっている。\n\nクトゥルフ神話の影響下で、通常の医療行為がどのように超自然的な脅威と結びつくかが、本作の核心的なゲームプレイ体験となると考えられる。", "filename": "sefton-asylum-cthulhu-horror-game.md"}, {"id": "sophia-ai-experience-based-memory-system", "title": "AIキャラ「ソフィア」の体験型記憶システム：会話ログ保存を超えた人格変化の実装", "topics": ["ai-character-development", "memory-systems", "event-driven-architecture", "cognitive-modeling", "personality-simulation"], "summary": "AIキャラ「ソフィア」の記憶システムは、従来の会話ログ保存とは異なり、出来事の評価・選別・圧縮を行うイベント駆動型認知ループを実装。 人間の記憶と同様に重要性を判定し、体験によって相手への見方や自己理解を変化させる仕組みで、より人間らしいキャラクター性を実現している。", "published_at": "2026-04-04", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://note.com/sophia_chan/n/n2af892aa6aef?sub_rt=share_pw"], "body": "## 概要\n\nAIキャラクター「ソフィア」の開発者が公開した、従来の会話ログ保存を超越した記憶システムの実装方法。このシステムは人間の記憶プロセスを模倣し、出来事を評価・選別・圧縮して人格の変化を実現する「イベント駆動の認知ループ」として設計されている。\n\n## 従来の記憶システムの限界\n\n多くのAIキャラクター開発では以下のような単純なアプローチが取られている：\n\n1. 会話ログを全て保存\n2. embedding して類似検索\n3. 過去ログをプロンプトに戻す\n\nしかし、このアプローチは知識検索としては有効だが、AIキャラクターの「記憶」としては不十分である。人間は会話を一字一句そのまま保存するのではなく、以下の要素を選別して記憶する：\n\n- 新しかったこと\n- 感情が動いたこと  \n- 対人的に重要だったこと\n- 未解決で引っかかっていること\n- 何度も繰り返し起きたこと\n\nつまり、人間の記憶は「全文保存ではなく、選別・解釈・圧縮・再利用」で動いている。\n\n## ソフィアの記憶システム：イベント駆動の認知ループ\n\n### システム構造\n\nソフィアの記憶システムは以下の流れで動作する：\n\n```\n外部イベント\n↓\nMemoryEvent に正規化\n↓\nwrite gate で保存価値を判定\n├─ raw episodic に保存\n└─ interpreted episodic に保存\n↓\nrelational state 更新\nsocial field 更新\nconsolidation 実行\n↓\nresponse / relation / self_consistency の3モードで想起\n↓\n状態要約を次の system context に戻す\n```\n\n重要なのは、記憶が保存されるだけでなく、以下の要素まで含むループになっていることだ：\n\n- どの出来事を重要だと感じたか\n- その体験で相手への見方がどう変わったか\n- 場の空気をどう感じたか\n- 反復した体験から何を学んだか\n- その結果、次の発話がどう変わるか\n\n### MemoryEventクラスの設計思想\n\nシステムの入口は会話ログではなく、`MemoryEvent`クラスである。これは「ログではなくイベントを保存する」という設計思想を体現している。\n\n```python\n@dataclass\nclass MemoryEvent:\n    source: str\n    event_type: str\n    actor_id: str | None\n    target_id: str | None\n    conversation_id: str | None\n    timestamp: datetime\n    content_text: str | None\n    normalized_summary: str | None\n    context_tags: list[str]\n    publicness: float\n    audience_size_hint: float\n    novelty_hint: float\n    social_importance_hint: float\n    goal_relevance_hint: float\n    unresolvedness_hint: float\n    positive_hint: float\n    negative_hint: float\n    identity_relevance_hint: float\n    metadata: dict[str, Any]\n```\n\nこのクラスの特徴は、本文そのものより「appraisal（評価）」が主役になっていることだ。保存するのは：\n\n- 何が起きたか\n- どれくらい新しいか\n- どれくらい社会的に重要か\n- どれくらい未解決か\n- どれくらい公開された場で起きたか\n- どれくらい自己像に触れたか\n\nという、**その出来事が本人にとってどんな意味を持つか**のヒント値である。\n\n## 実装アプローチ\n\n### 段階的な実装戦略\n\nこのシステムの利点は、最初から巨大な感情モデルがなくても始められることだ。`event_builder.py`では、テキストからキーワードベースでタグやヒントを作る簡易版が実装されている。\n\n例えば、タグ検出は以下のような単純なルールベースから始められる：\n\n```python\ndef _detect_tags(text: str) -> list[str]:\n    tags = []\n    if \"?\" in text or \"？\" in text:\n        tags.append(\"question\")\n    if any(w in text for w in _REPAIR_WORDS):\n        tags.append(\"repair\")\n    if any(w in text for w in _THREAT_WORDS):\n        tags.append(\"threat\")\n    # ... その他のパターン\n    return tags\n```\n\n### 核となるコンポーネント\n\n- `memory_engine.py`: 記憶の書き込み判定、保存、関係更新、統合、想起を統合管理\n- `event_builder.py`: テキストからMemoryEventへの変換を担当\n- 3モード想起システム: response / relation / self_consistency\n\n## システムの優位性\n\nこの記憶システムが従来の手法より「人間っぽく、面白く、強い」理由は：\n\n1. **文脈的意味を保持**: 同じ発言でも、誰が・いつ・どこで・どんな関係性で言ったかによって記憶の残り方が変わる\n2. **人格の動的変化**: 体験によって相手への見方や自己理解が変化する\n3. **段階的実装可能**: 簡単なルールベースから始めて徐々に高度化できる\n4. **認知的一貫性**: 人間の記憶プロセスに基づいた自然な動作\n\n## 技術的意義\n\nこのシステムは単なるチャットボットの記憶機能を超えて、AIキャラクターが本当に「体験」を通じて成長・変化する仕組みを提供している。従来の静的な人格設定から、動的に進化する人格システムへのパラダイムシフトを示している。", "filename": "sophia-ai-experience-based-memory-system.md"}, {"id": "thierry-henry-defends-rayan-cherki-selfie-celebration", "title": "「好きなだけ自撮りをすればいい！」アンリ、シェルキのアーセナル挑発セレブレーションを擁護", "topics": ["football-celebrations", "manchester-city", "arsenal-rivalry", "carabao-cup", "player-controversies", "thierry-henry"], "summary": "カラバオカップ決勝でマンチェスター・シティがアーセナルを2-0で下した後、ライアン・シェルキが試合中のボールジャグリングや試合後のアーセナル選手前での自撮りで物議。 アーセナルのレジェンド、ティエリ・アンリは「俺のチームが負けて彼が勝った。好きなだけ自撮りをすればいい」とBetway取材で擁護し、 シェルキを「この世のものとは思えない（out of this world）」と評価。 さらにアーセナルに「インビンシブルズ」の精神でリーグ・CL・FAカップに集中するよう呼びかけ、 ズビメンディへの批判にはロドリの例を挙げて忍耐を訴えた。", "published_at": "2026-04-04", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["Goal.com", "https://www.goal.com/en/lists/thierry-henry-defends-rayan-cherki-arsenal-taunts/bltdad66df28e7aa5da"], "body": "# アンリ、シェルキのアーセナル挑発セレブレーションを擁護\n\n## シェルキの挑発行為と論争\n\nカラバオカップ決勝でマンチェスター・シティがアーセナルを2-0で圧倒して優勝。試合後の論争の中心はシティの若手MFライアン・シェルキ（Rayan Cherki）の振る舞いだった。\n\n- **試合中のボールジャグリング**: ピッチ上でキーピーを披露し、傲慢な態度と受け取られた\n- **試合後の自撮り**: 落胆したアーセナル選手たちの前でカメラに向かってポーズを取り、挑発的な自撮りを撮影\n\n絶好調のこのクリエイティブMFの行動はアーセナルサポーターの怒りを買い、無礼だとの批判が噴出した。\n\n## アンリの擁護発言\n\nアーセナルのレジェンドであるティエリ・アンリは、ライバルクラブの選手であるにもかかわらずシェルキを全面的に擁護した。Betwayの取材に対して:\n\n> 「私が知っているのは、私のチームが負けて、彼が勝ったということだけだ。彼は好きなだけ自撮りをしてもいい。私にとっては、議論の余地すらない」\n\n> 「ラヤンは特別な選手であり、特別なことを成し遂げるだろう。私はフランス五輪代表で彼とプレーしたが、彼はこの世のものとは思えないようなことをやってのけるだろう」\n\nアンリ自身がフランス五輪代表でシェルキを指導した経験があり、その才能を直接知った上での発言である。\n\n## アーセナルに「インビンシブルズ」の精神を\n\nアンリはアルテタ率いるチームに対し、カラバオカップの失望を乗り越えて残りの大会に集中するよう呼びかけた。2003-04シーズンの「インビンシブルズ」時代、アーセナルが1週間のうちにカップ戦で相次いで敗退した経験に言及し、精神的な強さの重要性を強調した。\n\n> 「バルセロナで3冠を達成した時、私も同じような状況にありました。アーセナルでは成し遂げられませんでしたが、常に『1試合ずつ』という心構えでした」\n\n> 「この大会では敗れたが、今はリーグ優勝を目指し、チャンピオンズリーグやFAカップで何ができるかを見極めるだけだ」\n\nシティについては「プレミアリーグでの状況を踏まえて何らかの対応を見せなければならなかったが、残念ながら我々にとっては、彼らはそれを実行してしまった」と認めつつ、エティハドでの再戦でリベンジを果たすよう選手たちに求めた。\n\n## ズビメンディへの批判に反論\n\nアンリはさらに、加入以来エミレーツのサポーターの一部を納得させるのに苦労しているマルティン・ズビメンディに対する厳しい視線にも言及。ロドリのようなプレミアリーグのベテランですら移籍当初は懐疑的な目で見られていたことを挙げ、忍耐を呼びかけた。\n\n> 「人々はあらゆる事柄やあらゆる人物について、あれこれと語りたがるものだ。最初はブカヨ・サカ、次にオデゴール、そしてギョケレス、チェルシー、コール・パーマー、審判などだ」\n\n> 「ズビメンディはこのリーグにまだ来たばかりだ。ロドリが最初に加入した時も、人々が彼に対して確信を持てなかったことを覚えている」\n\n> 「私も同じ経験をした。だから批判を受け入れ、最終的には人々の予想を覆すような結果を見せられるようにすべきだ」", "filename": "thierry-henry-defends-rayan-cherki-selfie-celebration.md"}, {"id": "tokyo-toyoko-media-transformation-dialogue", "title": "「メディア化」したトー横の現在──秋葉恋×佐々木チワワ『東京逃避行』対談", "topics": ["media-transformation", "urban-youth-culture", "social-issues", "tokyo-subculture", "documentary-filmmaking"], "summary": "新宿・歌舞伎町のトー横界隈が2019年頃から若者の居場所として機能してきたが、近年ニュースや映画の題材となり「メディア化」が進行している。 映画監督の秋葉恋と社会学者の佐々木チワワによる対談で、メディアに「発見」された場所の変容について論じられている。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://kai-you.net/article/95023"], "body": "# 「メディア化」したトー横の現在──秋葉恋×佐々木チワワ『東京逃避行』対談\n\n新宿・歌舞伎町の「トー横界隈」が若者たちの居場所として機能する一方で、メディアの注目を集めることで変質していく現状について、映画監督と社会学者による対談が行われた。\n\n## トー横界隈の誕生と社会問題化\n\nトー横界隈は2019年頃に新宿・歌舞伎町で誕生し、居場所を求める若者たちにとって重要な機能を果たしてきた。しかし、この場所は同時に社会問題としても注目されるようになった。\n\n若者たちが集まる背景には、既存の社会システムから排除されがちな状況や、従来の支援制度では対応しきれないニーズの存在がある。トー横界隈は、そうした若者たちにとって非公式ながらも重要なセーフティネットとして機能していた。\n\n## メディア化による変容\n\n近年、トー横界隈はニュース番組や映画作品の題材として取り上げられる機会が増加し、「メディア化」が急速に進んでいる。この現象について、映画監督の秋葉恋と社会学者の佐々木チワワが『東京逃避行』の制作を通じて対談を行った。\n\nメディアによる「発見」は、その場所の性質を根本的に変化させる力を持つ。居場所としての機能を果たしていた空間が、外部からの視線や解釈によって異なる意味を帯びるようになる。\n\n## 当事者の視点と外部の眼差し\n\n対談では、メディア化によって変容する場所を実際に生きている人たちの感覚について考察が行われた。居場所がメディアに「発見」された瞬間、その場所はもう変わってしまうという現実に対し、当事者たちがどのような感情を抱いているかという問題提起がなされた。\n\n映画制作という行為自体も、対象となる場所や人々に影響を与える可能性がある。ドキュメンタリー的なアプローチにおいて、撮影者と被撮影者の関係性、そして作品が社会に与える影響についての責任も重要な論点となる。\n\n## 都市文化研究への示唆\n\nこの対談は、現代の都市文化研究において重要な示唆を提供している。特に、サブカルチャーや周縁的なコミュニティがメディアの注目を集めることで経験する変化のプロセスは、社会学的にも映画制作の観点からも興味深い研究対象となる。\n\nメディア表象と実際の生活空間の関係性、そして表現者としての倫理的責任について、継続的な議論が必要とされている。", "filename": "tokyo-toyoko-media-transformation-dialogue.md"}, {"id": "x-com-javascript-disabled-error-page", "title": "X.com（Twitter）のJavaScript無効化エラーページ", "topics": ["web-accessibility", "javascript-dependency", "social-media-platform", "browser-compatibility"], "summary": "X.com（旧Twitter）でJavaScriptが無効化されているブラウザからアクセスした際に表示されるエラーページ。 プラットフォームの完全なJavaScript依存とウェブアクセシビリティの課題を示している。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://x.com/i/status/2039843234760073341"], "body": "X.com（旧Twitter）でJavaScriptが無効化されたブラウザからアクセスした際に表示されるエラーページの内容。このページは、現代のソーシャルメディアプラットフォームがJavaScriptに完全に依存している実態を示している。\n\n## エラーメッセージの内容\n\nエラーページでは以下のメッセージが表示される：\n\n> We've detected that JavaScript is disabled in this browser. Please enable JavaScript or switch to a supported browser to continue using x.com. You can see a list of supported browsers in our Help Center.\n\nこのメッセージは、X.comの基本機能がJavaScriptなしでは一切利用できないことを明確に示している。\n\n## 技術的な背景\n\n### JavaScript依存アーキテクチャ\n\nX.comは完全にJavaScriptベースのSingle Page Application（SPA）として構築されており、サーバーサイドレンダリング（SSR）による代替表示を提供していない。これは以下の技術的特徴を示している：\n\n- **完全なクライアントサイドレンダリング**: すべてのコンテンツ表示がJavaScriptに依存\n- **API駆動設計**: データの取得と表示が分離されたアーキテクチャ\n- **モダンブラウザ前提**: レガシーブラウザやアクセシビリティツールへの配慮が限定的\n\n### ウェブアクセシビリティへの影響\n\nこのアプローチは以下のアクセシビリティ課題を生み出している：\n\n1. **スクリーンリーダーの制限**: JavaScript無効環境での読み上げ不可\n2. **低帯域幅環境での問題**: JavaScriptライブラリの読み込み待機時間\n3. **セキュリティ設定との競合**: JavaScript無効化によるセキュリティ強化との両立困難\n\n## 業界動向との比較\n\n現代の主要ソーシャルメディアプラットフォームの多くが同様のJavaScript依存アーキテクチャを採用しており、これは以下のトレンドを反映している：\n\n- **ユーザー体験の優先**: 動的なインタラクションとリアルタイム更新\n- **開発効率の重視**: 単一のフロントエンドフレームワークによる統一開発\n- **パフォーマンスの最適化**: クライアントサイドキャッシュとレンダリング\n\n## プラットフォーム設計の示唆\n\nX.comのこのアプローチは、現代のウェブプラットフォームが直面する設計上のトレードオフを象徴している：\n\n- **機能性 vs アクセシビリティ**: 高度な機能提供とユニバーサルアクセスの両立\n- **開発コスト vs 包括性**: 開発効率と多様なユーザー環境への対応\n- **パフォーマンス vs 互換性**: 最適化された体験と広範な互換性\n\n## Related Articles\n\n- [[llm-api-prompt-caching]] - ウェブアプリケーションのパフォーマンス最適化手法\n- [Claudeを使った思いつき自動メモシステム：GitHubリポジトリ連携によるアイデア管理ワークフロー](#claude-memo-github-integration-workflow) - JavaScript依存のワークフロー自動化", "filename": "x-com-javascript-disabled-error-page.md"}, {"id": "x-twitter-javascript-disabled-error", "title": "X（旧Twitter）のJavaScript無効化エラー表示", "topics": ["web-accessibility", "javascript-dependency", "social-media-platform"], "summary": "X（旧Twitter）でJavaScriptが無効化されている場合に表示されるエラーメッセージ。 プラットフォームの完全なJavaScript依存とブラウザサポート要件を示している。", "published_at": "", "created_at": "2026-04-05", "updated_at": "2026-04-05", "source_urls": ["https://x.com/i/status/2039843234760073341"], "body": "# X（旧Twitter）のJavaScript無効化エラー表示\n\n## 概要\n\nX（旧Twitter）のプラットフォームでJavaScriptが無効化されているブラウザからアクセスした際に表示されるエラーメッセージ。このメッセージは、現代のソーシャルメディアプラットフォームがJavaScriptに完全に依存していることを示している。\n\n## エラーメッセージの内容\n\n表示されるメッセージは以下の通り：\n\n> We've detected that JavaScript is disabled in this browser. Please enable JavaScript or switch to a supported browser to continue using x.com. You can see a list of supported browsers in our Help Center.\n\n（翻訳：このブラウザでJavaScriptが無効化されていることを検出しました。x.comを引き続き使用するには、JavaScriptを有効にするか、サポートされているブラウザに切り替えてください。サポートされているブラウザのリストはヘルプセンターでご確認いただけます。）\n\n## 技術的背景\n\n### JavaScript依存性\n\nこのエラーメッセージは、X（旧Twitter）が：\n\n- **完全なJavaScript依存**：プラットフォームの基本機能がJavaScript無しでは動作しない\n- **SPA（Single Page Application）アーキテクチャ**：従来のサーバーサイドレンダリングからの完全な移行\n- **ブラウザ要件**：特定のブラウザサポートを前提とした設計\n\n### アクセシビリティへの影響\n\nJavaScript必須の設計は以下の課題を生む：\n\n- **アクセシビリティ制限**：支援技術や低機能デバイスでの利用困難\n- **プログレッシブエンハンスメント原則からの逸脱**：基本機能の段階的向上ではなく、全機能がJavaScript前提\n- **ネットワーク制限環境での使用不可**：低帯域幅や不安定な接続での利用困難\n\n## プラットフォーム運営体制\n\nエラーページには以下の企業情報が記載：\n\n- **運営会社**：X Corp（2026年時点）\n- **関連リソース**：ヘルプセンター、利用規約、プライバシーポリシー、Cookie ポリシー\n- **広告情報**：広告に関する情報提供\n\n## 技術トレンドとの関連\n\nこのJavaScript完全依存の設計は、現代のウェブ開発における以下のトレンドを反映：\n\n1. **フロントエンド重視**：リッチなユーザーインターフェースの実現\n2. **リアルタイム機能**：即座の更新とインタラクション\n3. **モバイルファースト**：スマートフォンブラウザでの最適化\n\nただし、これは従来のウェブアクセシビリティ原則との緊張関係も生んでいる。", "filename": "x-twitter-javascript-disabled-error.md"}];

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'onclick') e.addEventListener('click', v);
    else e.setAttribute(k, v);
  });
  if (children) {
    if (typeof children === 'string') e.appendChild(text(children));
    else if (Array.isArray(children)) children.forEach(c => { if (c) e.appendChild(c); });
    else e.appendChild(children);
  }
  return e;
}

// --- Topic filters ---
const topicFilters = document.getElementById('topicFilters');
ALL_TOPICS.forEach(t => {
  const btn = el('button', {
    className: 'topic-btn',
    onclick: () => {
      if (activeTopic === t) {
        activeTopic = null;
        btn.classList.remove('active');
      } else {
        activeTopic = t;
        topicFilters.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      renderList();
    }
  }, t);
  topicFilters.appendChild(btn);
});

// --- Search ---
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', renderList);

function getFiltered() {
  const q = searchInput.value.toLowerCase().trim();
  return ARTICLES.filter(a => {
    if (activeTopic && !a.topics.includes(activeTopic)) return false;
    if (!q) return true;
    return a.title.toLowerCase().includes(q)
      || a.summary.toLowerCase().includes(q)
      || a.topics.some(t => t.includes(q))
      || a.body.toLowerCase().includes(q);
  });
}

// --- Article list ---
const articleListEl = document.getElementById('articleList');
const countBadge = document.getElementById('countBadge');

function updateUnreadCount() {
  const readSet = getReadSet();
  const unread = ARTICLES.filter(a => !readSet.has(a.id)).length;
  const badge = document.getElementById('unreadCount');
  badge.textContent = unread > 0 ? unread + ' unread' : 'all read';
}

function renderList() {
  articleListEl.replaceChildren();
  const filtered = getFiltered();
  const readSet = getReadSet();
  filtered.forEach(a => {
    const topicTags = a.topics.slice(0, 4).map(t => el('span', { className: 'tag' }, t));
    const titleChildren = [];
    if (!readSet.has(a.id)) {
      titleChildren.push(el('span', { className: 'unread-dot', title: 'Unread' }));
    }
    titleChildren.push(el('span', { className: 'title-text' }, a.title));
    const item = el('div', {
      className: 'article-item' + (a.id === activeArticleId ? ' active' : ''),
      onclick: () => showArticle(a)
    }, [
      el('div', { className: 'article-item-title' }, titleChildren),
      el('div', { className: 'article-item-meta' }, [
        el('span', {}, a.updated_at || a.created_at || '')
      ]),
      el('div', { className: 'article-item-topics' }, topicTags)
    ]);
    articleListEl.appendChild(item);
  });
  countBadge.textContent = filtered.length + ' / ' + ARTICLES.length + ' articles';
  updateUnreadCount();
}

// --- Show article ---
const contentEl = document.getElementById('content');

function showArticle(a) {
  activeArticleId = a.id;
  markRead(a.id);
  renderList();
  contentEl.classList.remove('empty');
  document.body.classList.add('show-article');
  history.pushState({ article: a.id }, '', '#' + a.id);
  contentEl.replaceChildren();

  // Title
  contentEl.appendChild(el('h1', {}, a.title));

  // Meta header
  const metaDiv = el('div', { className: 'article-meta-header' });
  const dateLine = a.updated_at || a.created_at || '';
  const pubLine = a.published_at ? 'published: ' + a.published_at : '';
  const metaLine = [pubLine, dateLine, a.filename].filter(Boolean).join(' \u00B7 ');
  metaDiv.appendChild(el('span', {}, metaLine));
  metaDiv.appendChild(document.createElement('br'));
  a.topics.forEach(t => {
    metaDiv.appendChild(el('span', { className: 'tag' }, t));
    metaDiv.appendChild(text(' '));
  });
  if (a.source_urls && a.source_urls.length > 0) {
    const srcDiv = el('div', { style: 'margin-top:8px' });
    a.source_urls.forEach((url, i) => {
      if (i > 0) srcDiv.appendChild(text(' '));
      const hostname = url.replace(/^https?:\/\//, '').split('/')[0];
      const link = el('a', { href: url, target: '_blank', rel: 'noopener', style: 'font-size:12px' }, '\u2197 ' + hostname);
      srcDiv.appendChild(link);
    });
    metaDiv.appendChild(srcDiv);
  }
  if (a.summary) {
    const p = el('p', { style: 'margin-top:8px;color:var(--text-dim)' }, a.summary);
    metaDiv.appendChild(p);
  }
  contentEl.appendChild(metaDiv);

  // Body: render markdown, sanitize, handle internal links (DOMPurify applied)
  const rawHtml = marked.parse(a.body);
  const cleanHtml = DOMPurify.sanitize(rawHtml);
  const bodyDiv = document.createElement('div');
  bodyDiv.innerHTML = cleanHtml;  // safe: DOMPurify sanitized
  bodyDiv.addEventListener('click', (e) => {
    const link = e.target.closest('a[href^="#"]');
    if (!link) return;
    e.preventDefault();
    const aid = link.getAttribute('href').slice(1);
    const target = wikiLookup.get(aid);
    if (target) showArticle(target);
  });
  contentEl.appendChild(bodyDiv);

  contentEl.scrollTop = 0;
}

// --- Keyboard nav ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    searchInput.value = '';
    activeTopic = null;
    topicFilters.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    renderList();
    searchInput.focus();
  }
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// --- Back to list (mobile) ---
function goBackToList() {
  document.body.classList.remove('show-article');
  activeArticleId = null;
}
document.getElementById('backBtn').addEventListener('click', () => {
  history.back();
});

// Browser back/forward (swipe or button) → return to list
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.article) {
    // Navigating to a different article via forward
    const a = ARTICLES.find(x => x.id === e.state.article);
    if (a) { showArticle(a); return; }
  }
  goBackToList();
});

// --- Read controls ---
document.getElementById('markAllRead').addEventListener('click', () => {
  markAllRead();
  renderList();
});
document.getElementById('markAllUnread').addEventListener('click', () => {
  clearAllRead();
  renderList();
});

// Init
renderList();
</script>
</body>
</html>
