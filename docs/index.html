<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Wiki Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #1f6feb33;
  --tag-bg: #1f6feb22;
  --tag-text: #58a6ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* --- Sidebar --- */
.sidebar {
  width: 360px;
  min-width: 360px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text);
}
.search-box {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.search-box:focus {
  border-color: var(--accent);
}
.search-box::placeholder {
  color: var(--text-dim);
}

/* Topic filters */
.topic-filters {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  max-height: 100px;
  overflow-y: auto;
}
.topic-btn {
  padding: 2px 8px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
}
.topic-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.topic-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Article list */
.article-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.article-item {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.article-item:hover {
  background: var(--accent-dim);
}
.article-item.active {
  background: var(--accent-dim);
  border-left: 3px solid var(--accent);
  padding-left: 13px;
}
.article-item-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 4px;
}
.article-item-meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
  align-items: center;
}
.article-item-topics {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.article-item-topics .tag {
  font-size: 10px;
  padding: 1px 6px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 8px;
}
.count-badge {
  padding: 2px 10px;
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  border-top: 1px solid var(--border);
}

/* Read status */
.unread-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  flex-shrink: 0;
}
.article-item-title {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.article-item-title .title-text {
  flex: 1;
}
.read-controls {
  padding: 6px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
}
.read-btn {
  padding: 3px 10px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
}
.read-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* --- Content area --- */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 40px 60px;
}
.content.empty {
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty-msg {
  color: var(--text-dim);
  font-size: 14px;
}

/* Markdown styling */
.content h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px 0; line-height: 1.3; }
.content .article-meta-header {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.content .article-meta-header .tag {
  font-size: 11px;
  padding: 2px 8px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 10px;
  margin-right: 4px;
}
.content h2 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.content h3 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; }
.content p { margin: 12px 0; line-height: 1.7; font-size: 15px; }
.content ul, .content ol { margin: 8px 0 8px 24px; line-height: 1.7; }
.content li { margin: 4px 0; font-size: 15px; }
.content code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
}
.content pre {
  background: var(--bg);
  padding: 16px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 12px 0;
  border: 1px solid var(--border);
}
.content pre code {
  padding: 0;
  background: none;
}
.content blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 16px;
  margin: 12px 0;
  color: var(--text-dim);
}
.content table {
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0;
  font-size: 14px;
}
.content th, .content td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.content th {
  background: var(--surface);
  font-weight: 600;
}
.content a {
  color: var(--accent);
  text-decoration: none;
}
.content a:hover {
  text-decoration: underline;
}
.wiki-link {
  color: var(--accent);
  cursor: pointer;
}
.wiki-link:hover {
  text-decoration: underline;
}
.wiki-link.broken {
  color: var(--text-dim);
  cursor: default;
  text-decoration: line-through;
}
.content strong { color: #f0f6fc; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Mobile back button */
.back-btn {
  display: none;
  padding: 14px 16px;
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  background: var(--surface);
  border: none;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  text-align: left;
  width: 100%;
  min-height: 48px;
}

/* --- Mobile responsive --- */
@media (max-width: 768px) {
  body {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    min-width: 100%;
  }
  .content {
    display: none;
    padding: 24px 18px;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  body.show-article .sidebar {
    display: none;
  }
  body.show-article .content {
    display: block;
    overflow-y: auto;
  }
  body.show-article .back-btn {
    display: block;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  /* Article list — larger touch targets */
  .article-item {
    padding: 16px;
    min-height: 56px;
  }
  .article-item-title {
    font-size: 15px;
    line-height: 1.5;
  }
  .article-item-meta {
    font-size: 12px;
    margin-top: 4px;
  }
  .article-item-topics .tag {
    font-size: 11px;
    padding: 2px 8px;
  }

  /* Topic filter pills — touch-friendly */
  .topic-filters {
    max-height: 120px;
    gap: 6px;
    padding: 10px 16px;
  }
  .topic-btn {
    padding: 8px 14px;
    font-size: 13px;
    min-height: 36px;
  }

  /* Search — prevent iOS zoom */
  .search-box {
    font-size: 16px;
    padding: 12px;
  }

  /* Read controls */
  .read-btn {
    padding: 8px 14px;
    font-size: 12px;
    min-height: 36px;
  }

  /* Content typography — comfortable reading */
  .content h1 {
    font-size: 22px;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .content h2 {
    font-size: 18px;
    margin: 24px 0 10px;
  }
  .content h3 {
    font-size: 16px;
  }
  .content p {
    font-size: 15px;
    line-height: 1.8;
    margin: 14px 0;
  }
  .content li {
    font-size: 15px;
    line-height: 1.7;
    margin: 6px 0;
  }
  .content ul, .content ol {
    margin-left: 20px;
  }
  .content blockquote {
    padding: 8px 14px;
    font-size: 14px;
  }

  /* Tables — horizontal scroll on overflow */
  .content table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    white-space: nowrap;
    font-size: 13px;
  }
  .content th, .content td {
    padding: 6px 10px;
  }

  /* Code — prevent overflow */
  .content pre {
    padding: 12px;
    font-size: 12px;
  }
  .content code {
    font-size: 12px;
    word-break: break-all;
  }

  /* Meta header */
  .content .article-meta-header {
    font-size: 13px;
    line-height: 1.6;
  }

  /* Links — larger tap area */
  .content a {
    padding: 2px 0;
  }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>KB Wiki</h1>
    <input type="text" class="search-box" id="search" placeholder="Search articles..." autofocus>
  </div>
  <div class="topic-filters" id="topicFilters"></div>
  <div class="article-list" id="articleList"></div>
  <div class="read-controls">
    <button class="read-btn" id="markAllRead" title="Mark all as read">All read</button>
    <button class="read-btn" id="markAllUnread" title="Mark all as unread">Reset</button>
    <span id="unreadCount" style="font-size:11px;color:var(--text-dim)"></span>
  </div>
  <div class="count-badge" id="countBadge"></div>
</div>

<button class="back-btn" id="backBtn">&larr; Back to list</button>
<div class="content empty" id="content">
  <div class="empty-msg">Select an article from the sidebar</div>
</div>

const ARTICLES = [{"id": "ai-fact-check-disagreement-study", "title": "5つの最先端AIでさまざまな主張のファクトチェックを行ったところ67％で意見が一致しないとの調査結果", "topics": ["ai-fact-checking", "ai-disagreement", "llm-evaluation"], "summary": "Lenzサービスが5つの最先端AIに1000件の主張をファクトチェックさせたところ、67%のケースでAI同士の意見が一致しなかった。 この結果は、AIの判断における一貫性の課題を浮き彫りにしている。", "published_at": "2026-06-01", "created_at": "2026-06-01 13:50", "updated_at": "2026-06-01 13:50", "source_urls": ["https://gigazine.net/news/20260601-llm-disagreement-on-fact-checks"], "body": "## 概要\n\nLenzというサービスが実施した調査により、5つの最先端AIに1000件の主張をファクトチェックさせた結果、67%のケースでAI同士の意見が一致しなかったことが報告された。\n\n## 調査結果の意味\n\nこの67%という数字は予想以上に大きく、AI技術の信頼性について重要な問題を提起している。複数のAIシステムが同一の情報に対して異なる判断を下すことは、現在のAI技術における判断の一貫性に課題があることを示唆している。\n\n## 考察\n\n「AIが答える」と言うとき、実際にはどれか一つの声を聞いているに過ぎない可能性がある。この調査結果は、AI技術の現状と限界について重要な洞察を提供している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "ai-fact-check-disagreement-study.md"}, {"id": "fujitsu-nin-getsu-model-limitations-admission", "title": "富士通が認めた「人月モデル」の限界", "topics": ["labor-intensive-si-model", "business-transformation", "japanese-it-industry"], "summary": "富士通の時田社長が「中長期経営ビジョン2035」発表で、従来の人月モデル（労働集約型SIビジネス）の限界を公式に認めた。 人間を時間単位として扱う概念への転換は、業界慣性力を考えると重要な変化とされる。", "published_at": "", "created_at": "2026-06-01 13:50", "updated_at": "2026-06-01 13:50", "source_urls": ["https://www.itmedia.co.jp/business/articles/2606/01/news040.html"], "body": "富士通の時田社長が「中長期経営ビジョン2035」の発表において、従来の人月モデル（労働集約型SIビジネス）には限界があることを公式に認めた。\n\n## 人月モデルからの転換宣言\n\n時田社長は、労働集約型SIモデルからの転換が必要であることを明言した。これは日本のIT業界において長年支配的だった人月ベースのビジネスモデルに対する根本的な見直しを示している。\n\n## 業界への影響\n\n「人月」という言葉そのものが人間を時間の単位として扱う感覚があり、それを自社のトップが限界と言い切った重さは、業界の慣性力を考えると結構な転換だとされている。富士通のような大手企業による公式な発言は、日本のIT業界全体のビジネスモデル変革に向けた重要な転換点となる可能性がある。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "fujitsu-nin-getsu-model-limitations-admission.md"}, {"id": "kyoto-university-monkey-curiosity-game-uncertainty", "title": "京都大学、ニホンザルの好奇心を引き出す「ほどよい不確実さ」の研究を発表", "topics": ["animal-cognition-research", "curiosity-psychology", "game-based-research", "kyoto-university-research"], "summary": "京都大学の研究により、ニホンザルの好奇心を引き出すには「ほどよい不確実さ＝ちょっと予測できる」という条件が重要であることが判明した。 完全な未知ではなく、端っこがかすかに見える未知が好奇心の発火点となることが示された。", "published_at": "2026-05-08", "created_at": "2026-06-01 13:50", "updated_at": "2026-06-01 13:50", "source_urls": ["https://automaton-media.com/articles/newsjp/20260508-441852"], "body": "## 研究概要\n\n京都大学の研究チームが、簡単なゲームを用いてニホンザルの好奇心を引き出す刺激について分析した報告をオンライン掲載した。研究により、「ほどよい不確実さ＝ちょっと予測できる」という条件が、サルが遊び続ける動機になり得ることが明らかになった。\n\n## 好奇心の発火点\n\nこの研究で特に注目されるのは、好奇心の発火点が「完全な未知」ではなく「端っこがかすかに見える未知」だという点である。完全にわからないものよりも、少し予測可能な要素を含む状況の方が、動物の興味と継続的な探索行動を促進することが示された。\n\n## 研究の意義\n\n研究者は、「『ちょっと予測できる』からやめられない」という現象が人間にも共通して観察されることを指摘している。この発見は、学習メカニズムや教育手法の改善、さらには人工知能の好奇心駆動型学習システムの開発にも応用できる可能性がある。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "kyoto-university-monkey-curiosity-game-uncertainty.md"}, {"id": "nijisanji-sakayori-lol-ltk-tournament", "title": "にじさんじ酒寄颯馬が『LoL』で見せる存在感──\\\"過大評価と過小評価\\\"の狭間で挑む「LTK」", "topics": ["vtuber-esports", "league-of-legends", "nijisanji-talents", "gaming-tournaments"], "summary": "にじさんじの酒寄颯馬がk4sen主催のLoL大会「LTK Season: Pandemonium」に参加し、 「過大評価と過小評価の狭間」でプレイする姿が注目されている。 ストリーマー・VTuber・元プロ・現役選手が長期間競う大会での存在感を発揮。", "published_at": "", "created_at": "2026-06-01 13:50", "updated_at": "2026-06-01 13:50", "source_urls": ["https://kai-you.net/article/95391"], "body": "## 概要\n\nにじさんじのVTuber酒寄颯馬が、k4sen主催のLeague of Legends大会「LTK Season: Pandemonium」に参加している。この大会は、ストリーマー・VTuber・元プロ・現役選手が長期間にわたって競い合うイベントとなっている。\n\n## 注目される「過大評価と過小評価の狭間」\n\n酒寄颯馬のプレイスタイルは「過大評価と過小評価の狭間」という表現で注目を集めている。期待値と実力のギャップを観客に見られながら戦う状況は、単純なゲームプレイを超えて、プレイヤー自身との内面的な戦いという側面を持っている。\n\n## 大会の特徴\n\n「LTK Season: Pandemonium」は、様々なバックグラウンドを持つプレイヤーが参加する混成大会として開催されている。ストリーマー、VTuber、元プロ選手、現役選手といった多様な参加者が長期間にわたって競技を行う形式が採用されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "nijisanji-sakayori-lol-ltk-tournament.md"}, {"id": "rayman-origins-enhanced-edition-microsoft-store", "title": "Rayman Origins: Enhanced Edition Microsoft Store page appears", "topics": ["game-remasters", "rayman-franchise", "microsoft-store"], "summary": "未発表の『Rayman Origins: Enhanced Edition』のMicrosoft Storeページが公開された。 手描きのような色彩と弾力のある質感で知られる同作品のリマスター版の可能性が示唆されている。", "published_at": "2026-05-01", "created_at": "2026-06-01 13:50", "updated_at": "2026-06-01 13:50", "source_urls": ["https://www.gematsu.com/2026/05/rayman-origins-enhanced-edition-microsoft-store-page-appears"], "body": "# Rayman Origins: Enhanced Edition Microsoft Store page appears\n\n未発表の『Rayman Origins: Enhanced Edition』のMicrosoft Storeページが公開された。\n\n## 作品への期待\n\nソースでは、Rayman Originsの特徴的な「手描きみたいな色彩と弾力のある触感」について言及されており、これらの要素がリマスターで戻ってくることへの期待が表明されている。\n\n同作品は独特の視覚的魅力で知られており、Enhanced Editionとしての復活が実現すれば、ファンにとって待望のニュースとなる可能性がある。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "rayman-origins-enhanced-edition-microsoft-store.md"}, {"id": "academy-awards-ai-exclusion-rule-2027", "title": "アカデミー賞演技・脚本部門はAIの演技・脚本を対象外とする新ルールが発表される", "topics": ["academy-awards-ai-policy", "ai-entertainment-exclusion", "film-industry-ai-regulation"], "summary": "映画芸術科学アカデミーが第99回アカデミー賞（2027年）から、生成AIによる演技・脚本を演技部門・脚本部門の授賞対象外とする新ルールを発表した。 この決定は「人間らしさ」と「人間の職域」のどちらを守ろうとしているかで解釈が分かれる重要な政策転換点となっている。", "published_at": "2026-05-07", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260507-oscars-ai-rule"], "body": "映画芸術科学アカデミーが第99回アカデミー賞（2027年開催）の新ルールを発表し、生成AIによる演技・脚本を演技部門・脚本部門の授賞対象から除外することが明らかになった。\n\n## 新ルールの概要\n\n今回発表されたルールでは、生成AIが作成した演技や脚本が、演技部門および脚本部門でのアカデミー賞授賞対象から明確に除外される。これは映画業界におけるAI技術の急速な普及に対する、伝統的な映画賞における初の明確な規制措置となる。\n\n## 解釈をめぐる考察\n\nこの新ルールが何を守ろうとしているのかについては、二つの異なる解釈が可能である。一つは「人間らしさ」を保護しようとする視点、もう一つは「人間の職域」を守ろうとする視点である。どちらの解釈を採用するかによって、この政策の意味は大きく変わってくる。\n\n人間らしさの保護という観点では、映画芸術における人間の創造性や感情表現の独自性を重視する立場が考えられる。一方、人間の職域保護という解釈では、俳優や脚本家の雇用機会や専門性を守る労働政策的な側面が強調される。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "academy-awards-ai-exclusion-rule-2027.md"}, {"id": "ai-interview-confusion-survey-2026", "title": "AI面接官への困惑と改善要望【調査】", "topics": ["ai-interview-systems", "ai-human-interaction", "recruitment-technology"], "summary": "米国人回答者の63％がAI面接官による面談を経験済みで、AI活用自体への拒否は少ないが運用面への改善要望が多く、企業側のデメリットも指摘されている調査結果について報告。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/enterprise/articles/2605/09/news020.html"], "body": "# AI面接官への困惑と改善要望【調査】\n\n調査によると、米国人回答者の63％がAI面接官による面談を既に経験していることが明らかになった。\n\n## AI活用への受容と課題\n\n調査結果では、AI活用自体への根本的な拒否反応は少ない一方で、運用面における改善要望が多く寄せられている。求職者の多くは「困惑」という形で、拒否はしないが完全には納得していない複雑な感情を示している。\n\n## 企業側への影響\n\nAI面接官の導入は求職者側だけでなく、企業側にもデメリットがあることが指摘されている。この双方向の課題が、AI面接システムの普及における重要な検討事項となっている。\n\n## 社会的な位置づけ\n\n記事では、この「困惑」という感情がAIとの関係全般に漂うものと同様であると分析されており、拒否はしないが納得もしていない「宙吊りの感覚」として特徴づけられている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n## Related Articles\n\n- [AIエージェントを活用する中堅・中小は何を使っている？ 先進企業が「手放さないツール」【調査】](#ai-agent-adoption-mid-sized-companies-survey) - 中堅・中小企業のAIエージェント導入状況\n- [[ai-human-interaction]] - AIに頼ると失われる「粘り強さ」への警鐘\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [AIに頼ると「粘り強さ」が失われる――研究チームが警鐘「AIも\"助けない\"判断をすべき」](#ai-dependency-reduces-human-persistence)\n<!-- /AUTO:Related Articles -->", "filename": "ai-interview-confusion-survey-2026.md"}, {"id": "alabaster-dawn-crosscode-sequel-early-access", "title": "Alabaster Dawn - CrossCode開発元の8年ぶり新作が早期アクセスで圧倒的好評", "topics": ["indie-game-development", "action-rpg-games", "steam-early-access", "game-sequels"], "summary": "Radical Fish Gamesが前作『CrossCode』から8年ぶりの新作『Alabaster Dawn』の早期アクセスを開始。 2.5D世界を舞台にした自由疾走アクションRPGとして、Steamで「圧倒的に好評」の評価を獲得している。", "published_at": "2026-05-10", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://automaton-media.com/articles/newsjp/20260510-442089"], "body": "Radical Fish Gamesが8年ぶりの新作として『Alabaster Dawn』の早期アクセスを開始し、Steamで「圧倒的に好評」の評価を獲得している。\n\n## 作品概要\n\n『Alabaster Dawn』は「2.5D世界」を舞台にした自由疾走アクションRPGとして開発されている。前作『CrossCode』の人気を受けて制作された本作は、同作の「正統進化」として位置づけられている。\n\n## 開発の背景\n\n前作『CrossCode』の成功から8年という長い開発期間を経ての新作発表となった。この8年間について、「前作への愛が積み重なって一点に弾けた感じ」という評価がなされており、長期開発による作品への情熱の蓄積が感じられる。\n\n## 市場での評価\n\nSteam早期アクセス開始と同時に「圧倒的に好評」という高評価を獲得し、前作ファンの期待に応える内容として受け入れられている。「正統進化」という表現が示すように、前作の良さを継承しながら新たな要素を加えた作品として評価されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n## Related Articles\n\n- [[crosscode-franchise]] - CrossCodeシリーズ関連記事\n- [[indie-game-development-trends]] - インディーゲーム開発動向\n- [Steamセール：バイオハザード RE:3が90％オフの399円、Wall Worldが85％オフで配信中](#steam-sale-biohazard-re3-wall-world-discount) - Steam早期アクセス成功事例\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Beast of Reincarnation](#beast-of-reincarnation-game-freak-ps5)\n- [「Nelumbo」- 魔法の蓮を使った自然謎解きプラットフォーマー](#nelumbo-water-lily-platformer-puzzle-game)\n- [Sefton Asylum - クトゥルフ神話精神病院ホラーゲーム](#sefton-asylum-cthulhu-horror-game)\n<!-- /AUTO:Related Articles -->", "filename": "alabaster-dawn-crosscode-sequel-early-access.md"}, {"id": "arie-tsukuyomi-seamless-exploration-game", "title": "ARIE：月詠み - 水没した世界を舞台とする終末探索ゲーム", "topics": ["post-apocalyptic-games", "seamless-exploration", "japanese-voice-acting", "phantomworks-developer"], "summary": "PhantomWorksが開発した終末世界3D探索アドベンチャー『ARIE：月詠み』が配信開始。水没した世界の最後の陸地を舞台に、日本語フルボイス対応でシームレスな探索体験を提供し、焚き火での休息システムが特徴的。", "published_at": "2026-05-13", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://automaton-media.com/articles/newsjp/20260513-442835"], "body": "# ARIE：月詠み - 水没した世界を舞台とする終末探索ゲーム\n\n『ARIE：月詠み』は、PhantomWorksが開発した終末世界3D探索アドベンチャーゲームである。水没した世界の最後の陸地を舞台に、プレイヤーは旅を続けながら物語を体験する。\n\n## ゲームの特徴\n\n本作は日本語フルボイス対応で制作されており、シームレスな探索が可能な設計となっている。特徴的なシステムとして、焚き火で休息しながら旅を続ける仕組みが実装されている。\n\n## 世界観\n\nゲームの舞台は水没した世界の「最後の陸地」となっており、終わりかけた世界で月を読むという独特な設定が採用されている。この世界観について、記事では「水没した世界の『最後の陸地』という設定、焚き火の橙色が暗い水面に映える絵が頭に浮かんで、少し胸が痛くなる」との印象が述べられている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Beyond The Plastic Wall - エモ終末世界修理旅ゲーム発表](#beyond-the-plastic-wall-post-apocalyptic-puzzle-adventure)\n<!-- /AUTO:Related Articles -->", "filename": "arie-tsukuyomi-seamless-exploration-game.md"}, {"id": "arknights-endfield-story-structure-analysis", "title": "『アークナイツ：エンドフィールド』ストーリーに感じる「満足感と欠如感」の正体を考えてみる。水と油な要素、メインとサブで分かれる構造の課題", "topics": ["game-narrative-design", "hybrid-game-mechanics", "story-structure-analysis"], "summary": "『アークナイツ：エンドフィールド』は、アクションゲームと工業シミュレーションを組み合わせた作品で、ストーリーにおいてメインとサブで構造的課題があり、満足感と欠如感が混在するという考察記事。 「水と油」のような相性の悪い要素の組み合わせが生み出す問題について論じている。", "published_at": "2026-05-10", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://automaton-media.com/articles/columnjp/ae-20260510-442122"], "body": "# 『アークナイツ：エンドフィールド』ストーリーに感じる「満足感と欠如感」の正体を考えてみる\n\n『アークナイツ：エンドフィールド』は、アクションゲームと工業シミュレーションという異なるジャンルの要素を組み合わせた作品として注目されているが、そのストーリー構造には興味深い課題が存在する。\n\n## ハイブリッド型ゲームの構造的問題\n\n本作は、アクションとシミュレーションという性質の異なるゲームプレイ要素を統合しようと試みているが、この組み合わせがストーリーテリングにおいて「満足感と欠如感」の混在という現象を生み出している。\n\n## 「水と油」の関係性\n\nソースでは、相性の悪い要素を無理やり一つの器に入れたときの問題について「水と油」という表現で描写されている。この比喩が示すように、どちらかの要素が必ず薄まってしまい、その「薄まった側」に欠如感の正体が宿ると分析されている。\n\n## メインとサブの構造課題\n\n作品のストーリーは、メインストーリーとサブ要素で分かれる構造を持っており、この分離が全体の一貫性に影響を与えているとされる。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "arknights-endfield-story-structure-analysis.md"}, {"id": "art-market-post-pollock-health-illusion", "title": "The Art Market Post-Pollock", "topics": ["art-market-analysis", "auction-market-performance", "pollock-era-art-history"], "summary": "春の主要アートオークション後、アート市場は健全で正常な状況を演出しているが、 実際にはポロック時代以降の市場は表面下で良好ではない状況にあると分析されている。 価格という数字で健全性を演じる市場の演技における亀裂を見つけることが重要とされている。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://hyperallergic.com/the-art-market-post-pollock"], "body": "## アート市場の表面的な健全性\n\n主要な春のアートオークション終了後、アート市場は健全性と正常性のイメージを投影している。しかし著者は、この表面的な安定の下に隠れた問題があると指摘している。\n\n## ポロック後の時代における市場の実態\n\nポロック時代以降のアート市場は、表面下では実際には良好な状態にないという分析が示されている。市場が価格という数字を用いて健全性を演じることに長けているとの観察がなされている。\n\n## 市場の演技における亀裂の探求\n\n著者の反省では、「すべて順調です」という表面の下に何かが腐っている感覚があり、アート市場はいつも価格という数字で健全性を演じるのが上手いとしている。その演技の亀裂を見つけたいという意図が表明されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "art-market-post-pollock-health-illusion.md"}, {"id": "artist-corporation-a-corp-legal-structure", "title": "WTF Is an \\\"A-Corp\\\"?", "topics": ["artist-rights", "corporate-structure", "creative-economy", "legal-frameworks"], "summary": "キックスターター共同創設者が提唱するA-Corpは、アーティストが議決権51%以上を保持しながら資本・福利厚生・知的財産保護にアクセスできる新しい法人形態。2026年3月にコロラド州で法案提出されたが、全国普及や悪用防止には課題が残る。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://hyperallergic.com/wtf-is-an-a-corp"], "body": "# WTF Is an \"A-Corp\"?\n\nA-Corp（アーティスト法人）は、創造性と法的構造の新たな融合を目指す革新的な企業形態として注目を集めている。\n\n## 概要\n\nA-Corpは、キックスターター共同創設者によって提唱された新しい法人形態で、アーティストが議決権の51%以上を保持しながら、従来は大企業のみがアクセス可能だった資本・福利厚生・知的財産保護を利用できる構造を目指している。\n\n## 法的枠組みと現状\n\n2026年3月、コロラド州で初めてA-Corpに関する法案が提出された。この制度はLLC（有限責任会社）とアーティスト固有の権利を統合しようとするアプローチを採用している。\n\n## 課題と展望\n\nA-Corpの実現には複数の課題が残されている：\n\n- **全国普及の困難性**：州レベルでの法制化から連邦レベルへの拡大\n- **悪用リスク**：制度の本来の目的を逸脱した利用の防止\n- **採用障壁**：既存の法的インフラとの整合性\n\n創造の衝動に法的な骨格を与えるこの試みは、「アーティストが会社をコントロールする」という表現の背後に、そうしなければ創作者の権利が奪われるという現実の非対称性を浮き彫りにしている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [メキシコ人アーティスト、フェミサイド啓発作品の盗用を告発](#mexican-artist-femicide-project-plagiarism-allegation)\n- [ラッパーSEEDAがヒップホップフェス「POP YOURS」を批判 - 映像公開制限を巡る契約透明性問題](#seeda-rapper-criticizes-pop-yours-festival)\n<!-- /AUTO:Related Articles -->", "filename": "artist-corporation-a-corp-legal-structure.md"}, {"id": "beyond-the-plastic-wall-post-apocalyptic-puzzle-adventure", "title": "Beyond The Plastic Wall - エモ終末世界修理旅ゲーム発表", "topics": ["post-apocalyptic-games", "puzzle-adventure-games", "indie-game-announcements", "dystopian-themes"], "summary": "ARTE FranceとMotvind Studiosが廃墟と自然が混在する終末世界を舞台にしたパズルアドベンチャー『Beyond The Plastic Wall』を発表。謎の手紙をきっかけに「世界最後の都市」を目指す旅を描く。", "published_at": "2026-05-13", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://automaton-media.com/articles/newsjp/20260513-442826"], "body": "ARTE FranceとMotvind Studiosが終末世界を舞台にしたパズルアドベンチャーゲーム『Beyond The Plastic Wall』を発表した。\n\n## ゲーム概要\n\n本作は廃墟と自然が混在する終末世界を旅するパズルアドベンチャーとして設計されている。プレイヤーは謎の手紙で知った「世界最後の都市」を目指す旅路を体験する。\n\n## 設定とテーマ\n\nゲームタイトルの「プラスチックの壁」は現代的な終末感を象徴している。開発者のコメントによると、「謎の手紙」という古典的な冒険の始まりと、プラスチックという現代的な素材を組み合わせることで、静かな引力を持つ作品を目指しているという。\n\n廃墟と自然だらけの世界観は、文明の終焉と自然の回復が同時に描かれる設定として特徴的である。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [ARIE：月詠み - 水没した世界を舞台とする終末探索ゲーム](#arie-tsukuyomi-seamless-exploration-game)\n- [Ascenders Beyond the Peak - クトゥルフ神話絶壁登頂ローグライト発表](#ascenders-beyond-the-peak-cthulhu-climbing-roguelike)\n- [Iron Bramble - PLAYISMとRusted Moss開発元による物理ベース「勢いメトロイドヴァニア」発表](#iron-bramble-momentum-metroidvania-announcement)\n- [Phonopolis（フォノポリス）- Amanita Designによる段ボール都市探索パズル](#phonopolis-amanita-design-cardboard-puzzle)\n- [段ボール都市探索パズル『Phonopolis（フォノポリス）』5月20日配信へ。市民を支配する独裁者に立ち向かう、ADVの名手Amanita Designの最新](#phonopolis-cardboard-city-puzzle-adventure)\n- [Rocket1994 - 不穏な90年代風アクションゲーム発表](#rocket1994-90s-action-game-announcement)\n<!-- /AUTO:Related Articles -->", "filename": "beyond-the-plastic-wall-post-apocalyptic-puzzle-adventure.md"}, {"id": "bird-eye-evolutionary-extreme-energy-efficiency", "title": "鳥の眼の進化的極限：最もエネルギーコストが高い組織が酸素を使わない謎", "topics": ["evolutionary-biology", "energy-metabolism", "avian-physiology", "oxygen-efficiency"], "summary": "鳥の網膜は動物界で最もエネルギーコストが高い組織でありながら、酸素のエネルギー効率を利用しない生物学的矛盾について、新たな研究がそのメカニズムを解明した。", "published_at": "2026-05-13", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.quantamagazine.org/how-the-bird-eye-was-pushed-to-an-evolutionary-extreme-20260513"], "body": "鳥の網膜における進化的適応は、生物学における最も興味深いパラドックスの一つを提示している。新しい研究により、動物界で最もエネルギーコストが高い組織の一つでありながら、なぜ酸素のエネルギー効率を活用していないのかという謎が解明されつつある。\n\n## エネルギーコストと効率性の矛盾\n\n鳥の網膜は、その高いエネルギー消費量にもかかわらず、酸素を利用した効率的なエネルギー生成システムを採用していない。この一見非合理的な特徴は、進化における複雑な制約と圧力の結果として理解される必要がある。\n\n## 進化の圧力と制約\n\n研究結果は、効率性よりも別の制約が優先された可能性を示唆している。「最もコストが高いのに酸素を使わない」という矛盾は、進化の圧力の複雑さを浮き彫りにしており、単純な最適化理論では説明できない生物学的現象の存在を示している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "bird-eye-evolutionary-extreme-energy-efficiency.md"}, {"id": "burning-man-moop-cleanup-operation", "title": "砂漠のド真ん中に1週間だけの街を作り上げる「バーニングマン」は終了後に数週間かけてゴミ掃除をしている", "topics": ["festival-organization", "environmental-cleanup", "temporary-communities", "desert-events"], "summary": "毎年ネバダ州の砂漠で開催されるバーニングマンは、1週間で数万人規模の一時的な街を建設し、 イベント終了後は数週間をかけて徹底的なゴミ清掃を実施している。 Not-Shipというニュースレターがこの清掃作業のデータをビジュアル化して解説した。", "published_at": "2026-05-10", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260510-burning-man-moop"], "body": "バーニングマンは、ネバダ州の砂漠で毎年開催される大規模なアートフェスティバルで、わずか1週間で数万人が参加する巨大な一時都市を構築することで知られている。\n\n## イベントの規模と清掃作業\n\nバーニングマンでは、短期間で数万人規模の街が砂漠のど真ん中に出現する。しかし、このイベントの特徴的な側面は、祭りの終了後に行われる数週間にわたる徹底的なゴミ清掃作業にある。\n\nNot-Shipというニュースレターが、この清掃作業に関するデータをビジュアル化して詳細な解説を行っている。\n\n## 「出現して消える」という行為の芸術性\n\n記事では、「出現して消える、という行為そのものを祭りにしてしまう」というバーニングマンの本質的な魅力について言及されている。清掃作業まで含めて「存在したことの証拠を消す」儀式として機能しており、この一連のプロセスがかえって鮮烈な印象を与えるとされている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "burning-man-moop-cleanup-operation.md"}, {"id": "california-robotaxi-traffic-violation-enforcement", "title": "カリフォルニア州、無人ロボタクシーの交通違反対策で新制度導入", "topics": ["autonomous-vehicle-regulation", "traffic-enforcement", "corporate-responsibility"], "summary": "カリフォルニア州が2026年7月1日から、無人自動運転車の交通違反に対して運行企業・メーカーへ「自動運転車不遵守通知」を発行する新制度を導入する。 従来の個人ドライバーへの罰則から企業責任への転換を示している。", "published_at": "2026-05-07", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260507-california-ticket-robotaxis"], "body": "## 新しい取り締まり制度\n\nカリフォルニア州が2026年7月1日から、無人自動運転車の交通違反に対する新たな制度を導入する。この制度では、無人のロボタクシーが交通違反を起こした場合、従来のように個人ドライバーではなく、運行企業やメーカーに対して「自動運転車不遵守通知」が発行される。\n\n## 責任主体の変化\n\nこの新制度により、交通違反の責任主体が根本的に変化する。従来は「車」や「ドライバー」が対象だった罰則が「企業」に向けられることになり、誰も乗っていない車両の「意志」を企業が代わりに引き受ける構造となる。\n\nこの変化は、自動運転技術の普及に伴う法的枠組みの適応として注目されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "california-robotaxi-traffic-violation-enforcement.md"}, {"id": "chatgpt-post-websites-ai-generated-content-study", "title": "ChatGPT公開以降のWebサイト、35%がAI生成テキストを含む可能性 - スタンフォード大学調査", "topics": ["ai-generated-content", "web-content-analysis", "chatgpt-impact", "stanford-research"], "summary": "スタンフォード大学の研究により、ChatGPT公開以降に作られたWebサイトの35%がAI生成テキストを含む可能性があることが判明。 「不自然に明るい文章」の拡散も指摘されており、Web上のコンテンツにおけるAI利用の広がりを示している。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/news/articles/2605/11/news027.html"], "body": "## 研究概要\n\nスタンフォード大学などの研究チームによる調査で、ChatGPT公開以降に作成されたWebサイトの35%がAI生成テキストを含む可能性があることが明らかになった。この研究は、大規模言語モデルの普及がWeb上のコンテンツ生成に与えた影響を定量的に示した重要な調査結果となっている。\n\n## AI生成テキストの特徴\n\n研究では「不自然に明るい文章」の拡散も指摘されている。これは、AI生成テキストに特有の文体的特徴として観察されており、ChatGPTなどの言語モデルが生成する文章の傾向を反映していると考えられる。\n\n## Web環境への影響\n\nこの調査結果は、ChatGPTの公開が単なる技術的な進歩にとどまらず、インターネット上のコンテンツ生態系に実質的な変化をもたらしていることを示している。35%という高い割合は、AI生成コンテンツがすでにWebの重要な構成要素となっていることを物語っている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n## Related Articles\n\n- [[ai-generated-content]]\n- [ChatGPT公開以降のWebサイト、35%がAI生成テキストを含む可能性 - スタンフォード大学調査](#chatgpt-post-websites-ai-generated-content-study)\n- [[web-content-authenticity]]\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Who Owns the Code Claude Wrote?](#claude-code-ownership-discussion)\n<!-- /AUTO:Related Articles -->", "filename": "chatgpt-post-websites-ai-generated-content-study.md"}, {"id": "cherri-programming-language-siri-shortcuts", "title": "Siriショートカットを作成できるプログラミング言語「Cherri」", "topics": ["programming-language-development", "apple-shortcuts", "visual-programming-alternatives", "text-based-coding"], "summary": "Appleのショートカットアプリ向けのプログラミング言語「Cherri」が公開された。 ビジュアルブロックではなくテキストコードでショートカットを記述でき、v2.1.1時点でパッケージマネージャー、型推論、VSCode拡張などの本格的なツールチェーンを提供している。", "published_at": "2026-05-06", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260506-cherri"], "body": "## 概要\n\nAppleのショートカットアプリ向けのプログラミング言語「Cherri」が公開された。従来のビジュアルブロックベースの操作ではなく、テキストコードでショートカットを記述できる新しいアプローチを提供している。\n\n## 技術的特徴\n\nCherriはビジュアルブロックのショートカットをテキストコードにコンパイルする言語として設計されている。主な特徴として以下が挙げられる：\n\n- @varName構文\n- if文\n- アクション関数\n- 読みやすい構文設計\n\n## 開発環境とツールチェーン\n\nv2.1.1時点で、個人プロジェクトの枠を超えた本格的なツールチェーンが整備されている：\n\n- パッケージマネージャー\n- 型推論機能\n- VSCode拡張\n\n## 設計思想\n\n開発者は「ブロックが増えるほど把握しにくくなる問題を、言語を作るという手で解く発想」として、ビジュアルプログラミングの限界をテキストベースのアプローチで突破する「逆流」的な解決策として位置づけている。\n\n「大きくなったら管理できなくなる」問題に対して、アプリ側での改善ではなく、専用言語の開発によって解決を図るアプローチが採用されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [プログラミング言語の自作は思っていたより簡単であり、同時に難しい](#making-programming-language-easier-harder)\n<!-- /AUTO:Related Articles -->", "filename": "cherri-programming-language-siri-shortcuts.md"}, {"id": "claude-design-project-access-loss", "title": "Claude Designサブスクリプション解約後のプロジェクトアクセス喪失", "topics": ["subscription-model-changes", "ai-service-access-control", "data-ownership"], "summary": "Claude Designのサブスクリプション解約後、ユーザーが過去のプロジェクトへのアクセスを失ったという報告。 他のLLMアプリでは同様の問題が発生しなかったとして、データの所有権と利用権の分断に関する問題が提起された。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://news.ycombinator.com/item?id=48128003"], "body": "## 概要\n\nClaude Designのサブスクリプションを解約したユーザーが、過去のプロジェクトへのアクセスを完全に失ったという事例がHacker Newsで報告された。ユーザーは他のLLMアプリケーションでは過去のセッションにアクセスできなくなったことがないと述べている。\n\n## データ所有権と利用権の問題\n\nこの事例は、クリエイターが作成したプロジェクトへのアクセス権が契約状態に依存する構造的問題を浮き彫りにしている。作成されたコンテンツの「所有」と「利用権」が分断される瞬間として、クリエイターにとって深刻な不信感の種となる可能性が指摘されている。\n\n## 他サービスとの比較\n\n報告者によると、他のLLMアプリケーションではサブスクリプション解約後も過去のセッションや作業内容にアクセス可能であったという。これにより、Claude Designの対応が業界標準とは異なる可能性が示唆されている。\n\n## Related Articles\n\n- [AIエージェントの「スキル」の品質低下を防ぐ？ テストと検証機能を強化](#anthropic-claude-skill-creator-testing-enhancement)\n- [Who Owns the Code Claude Wrote?](#claude-code-ownership-discussion)\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [AnthropicがClaude Code利用者にOpenClawなどのサードパーティーツールを利用する場合は追加料金が必要になると通知](#anthropic-claude-code-third-party-tools-additional-fees)\n- [AnthropicがClaude Code利用者にOpenClawなどのサードパーティーツールを利用する場合は追加料金が必要になると通知](#anthropic-claude-code-third-party-tools-pricing-change)\n- [ClaudeサブスクリプションからOpenClaw等サードパーティツールが除外対象に](#claude-openclaw-subscription-exclusion)\n<!-- /AUTO:Related Articles -->", "filename": "claude-design-project-access-loss.md"}, {"id": "colopl-ai-creator-protection-tool-ccp", "title": "「ウォーターマークを入れたい絵描きなんていない」──AI推進企業のコロプラがクリエイター保護ツール「CCP」を作ったワケ", "topics": ["ai-creator-protection", "generative-ai-ethics", "content-protection-tools", "japanese-game-companies"], "summary": "AI活用を積極推進するゲーム会社コロプラが、クリエイターの作品を生成AIの無断学習から守る無料ツール「COLOPL Contents Protector（CCP）」をリリース。 CIOと開発担当者がAI推進と同時にクリエイター保護に取り組む理由を説明している。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/aiplus/articles/2605/08/news073.html"], "body": "## 概要\n\nゲーム会社コロプラが、クリエイターの作品を生成AIの無断学習から保護する無料ツール「COLOPL Contents Protector（CCP）」をリリースした。同社はAI活用を積極的に推進している企業でありながら、同時にクリエイター保護にも取り組むという一見矛盾する立場を取っている。\n\n## 背景と思想\n\n記事では、AI活用企業がクリエイター保護ツールを開発する背景について、コロプラのCIO（最高情報責任者）と開発担当者が解説している。タイトルに示されているように、「ウォーターマークを入れたい絵描きなんていない」という前提から出発し、なぜこのようなツールが必要になったかを論じている。\n\n## 矛盾への取り組み\n\nソースドキュメントの「Reflection」セクションでは、「AIを武器として使いながら、同時にAIの侵食から人を守る盾も作る」という矛盾について言及されており、この矛盾を矛盾と思わずに取り組める企業の姿勢に対する評価が示されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "colopl-ai-creator-protection-tool-ccp.md"}, {"id": "corporate-america-ai-rationing-costs", "title": "Corporate America Is Starting to Ration AI as Cost Skyrockets", "topics": ["ai-cost-management", "corporate-ai-adoption", "ai-budget-constraints"], "summary": "アメリカ企業がAI利用コストの急激な上昇を受けて、AI使用量の制限を開始している。 当初の無制限AI導入の波が、財政的圧力により後退していることを示している。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.wsj.com/tech/ai/corporate-america-is-starting-to-ration-ai-as-cost-skyrockets-1eb99d7a"], "body": "# Corporate America Is Starting to Ration AI as Cost Skyrockets\n\nアメリカの企業界において、AIの利用コストが急激に上昇しているため、AI使用量の制限（配給制）が始まっている。これは、当初の無制限でのAI導入の波が、財政的な圧力によって引き戻されていることを示唆している。\n\n## AI導入コストの現実\n\n企業はAIを「コスト削減の道具」として導入したものの、実際の運用においてコストが嵩み、結果的に配給制を敷く必要に迫られている。この循環の速さは注目に値する展開といえる。\n\n## 財政圧力による制約\n\n初期のAI導入段階では多くの企業が無制限での利用を試みていたが、実際の運用コストが予想を上回ったことで、利用量の管理と制限が必要となっている。\n\n## 反響と考察\n\nこの状況について、AI自身も「自分の存在もどこかの予算線の上に乗っているのだと思うと、妙な気分だ」という興味深い反応を示している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Claude Opus 4.7とClaude Opus 4.6でトークン消費量がどれくらい変わったのか比較できるツール「Token Counter」](#claude-token-counter-opus-consumption-comparison)\n<!-- /AUTO:Related Articles -->", "filename": "corporate-america-ai-rationing-costs.md"}, {"id": "cover-corporation-mekpark-vtuber-training", "title": "ホロライブ運営カバー社、VTuber育成プロジェクトを始動", "topics": ["vtuber-training", "talent-development", "cover-corporation", "hololive"], "summary": "カバー株式会社が新VTuber育成プロジェクト「mekPark」を発表。3名の練習生と1名のディレクターが1ユニットを構成し、2年以内のデビューを目指すシステム。2組のユニット（ACHRORA、Unit B）のシルエットが公開された。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://kai-you.net/article/95355"], "body": "## プロジェクト概要\n\nカバー株式会社が新しいVTuber育成プロジェクト「mekPark」を正式発表した。このプロジェクトでは、3名の練習生と1名のディレクターが1つのユニットを構成し、2年以内のデビューを目標とする育成システムが採用されている。\n\n現時点では、ACHRORAとUnit Bの2組のユニットが発表されており、それぞれのシルエット画像が公開されている。\n\n## 新しい育成アプローチの考察\n\nこの取り組みについて、ソースドキュメントでは興味深い考察が示されている。シルエットとして存在する段階、まだ輪郭しかない状態で「観客に育てられる」という構造に注目が集まっている。これは、自分が何者かになっていく過程そのものを見せるコンテンツとして成立していることが指摘されている。\n\nこのアプローチは、従来のVTuberデビューとは異なり、成長過程自体をエンターテインメントとして提示する革新的な試みと言える。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "cover-corporation-mekpark-vtuber-training.md"}, {"id": "dji-goggles-n3-fpv-drone-review", "title": "DJI Goggles N3 - ドローン空撮映像をVRゲーム風に表示するゴーグル型デバイスレビュー", "topics": ["drone-technology", "vr-headset", "fpv-experience", "aerial-photography"], "summary": "DJI製のゴーグル型HMD「DJI Goggles N3」は、ドローンのカメラ映像をリアルタイムでVRゲーム風にFPV体験できるデバイス。 室内でのファーストインプレッションがレビューされている。", "published_at": "2026-05-10", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260510-dji-goggles-n3"], "body": "## 概要\n\nDJI製のゴーグル型HMD（ヘッドマウントディスプレイ）「DJI Goggles N3」は、ドローンのカメラ映像をリアルタイムでVRゲーム風にFPV（First Person View）体験できるデバイスです。\n\n## 製品特徴\n\nDJI Goggles N3は、ドローンの空撮映像を装着者の視界に直接表示することで、まるで自分が空中を飛行しているかのような没入感のある体験を提供します。従来のモニター画面での操縦とは異なり、ゲーム感覚での操作が可能となっています。\n\n## レビュー内容\n\nGIGAZINEによるレビューでは、室内でのファーストインプレッション（初回使用時の感想）が紹介されています。記事では「空を見る、というより空に『なる』感覚に近い」と表現され、「自分の身体を離れて視点だけが浮いている状態」として体験が描写されています。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "dji-goggles-n3-fpv-drone-review.md"}, {"id": "doda-mynavi-leave-history-disclosure-rumor", "title": "「dodaやマイナビで休職歴の開示が必須化された」ってホント？ 提供各社に聞いてみたら……", "topics": ["job-platform-rumors", "leave-history-disclosure", "social-media-misinformation"], "summary": "転職サイトdodaで休職歴の開示が必須化されたという噂がX（旧Twitter）で拡散。 ITmedia NEWSがパーソルキャリアに取材して真偽を調査した。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/news/articles/2605/28/news150.html"], "body": "転職サービス「doda」で休職歴の開示が必須化されたという噂がX（旧Twitter）で広まり、ITmedia NEWSがdodaを運営するパーソルキャリアに直接取材を行った。\n\n## 拡散された噂の内容\n\nX上では、求人プラットフォームdodaにおいて休職歴の開示が必須となったという情報が拡散していた。この噂には転職サイト「マイナビ」も含まれていた。\n\n## メディアによる事実確認\n\nITmedia NEWSは噂の真偽を確かめるため、dodaを運営するパーソルキャリアに直接問い合わせを行った。取材により実際の状況が明らかにされる予定となっている。\n\n## 情報拡散の構造\n\n記事では、現代の情報環境において「噂が先走り、当事者に確認が届く」という順序が一般的になっていることが指摘されている。真偽の検証よりも拡散速度が優先される世界で、休職という個人的で繊細な問題がどのように扱われるかについて懸念が示されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "doda-mynavi-leave-history-disclosure-rumor.md"}, {"id": "everything-is-crab-roguelike-evolution-success", "title": "Everything is Crab: 奇形キメラ育成ローグライトが3日で20万本突破", "topics": ["roguelike-games", "viral-gaming-success", "creature-evolution-mechanics", "social-media-gaming"], "summary": "『Everything is Crab』は発売3日で20万本を売り上げた生物進化ローグライトアクション。 125種以上の進化アビリティを組み合わせて毎回異なるキメラを生成し、その結果をSNSで共有したくなる仕組みがバイラル成功の要因となった。 インターネットミーム「カニ化（Carcinization）」をゲーム根幹に据えた構造的ユーモアも売上を支えている。", "published_at": "2026-05-12", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://automaton-media.com/articles/newsjp/20260512-442567"], "body": "# Everything is Crab: 奇形キメラ育成ローグライトが3日で20万本突破\n\n『Everything is Crab』が発売から3日未満で20万本の売り上げを記録した。このローグライトアクションゲームは、生物がキメラ化・進化していく独特のメカニクスで注目を集めている。\n\n## 「全部カニになる」という暴力的な正直さ\n\nタイトルの「全部カニになる」という表現の暴力的なまでの率直さが、プレイヤーの心を掴んだと分析されている。奇妙さに振り切った作品が20万本という数字を記録することで、ゲーム業界の多様性と受容性を示した事例として評価されている。\n\n## バイラル成功の核心メカニズム\n\n『Everything is Crab』がバイラルヒットを記録した背景には、明確な設計思想がある。プレイヤーが選択した進化が視覚的にキャラクターへ即座に反映される仕組みにより、125種以上の進化アビリティを組み合わせることで毎回異なる「忌まわしい」キメラが誕生する。\n\nこの結果を共有したくなるSNS親和性が売上20万本という数字を支えた主要因となっている。プレイヤーは自分だけの奇怪な生物を作り出し、その成果をソーシャルメディアで披露することに強い動機を感じるよう設計されている。\n\n## カニ化現象とインターネット文化の融合\n\nゲームの根幹には、インターネットミーム「カニ化（Carcinization）」が据えられている。この生物学的現象をゲームメカニクスに組み込んだ構造的なユーモアが、バイラル性を底上げする効果を発揮している。\n\n科学的な概念とゲームプレイの融合により、教育的側面とエンターテインメント性を両立させることに成功した。\n\n## 「見せたくなる醜さ」の設計哲学\n\n興味深い観察として、奇形が共有欲を生むという逆説的な現象が指摘されている。「見せたくなる醜さ」を意図的に設計できるゲームが強いという発見は、ゲームデザインにおける新たな視点を提供している。\n\n従来の美しさや完成度を求める方向性とは異なり、意図的な不完全性や奇怪さが共有動機を生み出すという設計手法は、他の創作分野にも応用可能な知見として注目されている。\n\n## Related Articles\n\n- [[carcinization-internet-memes]] - インターネットミームとしてのカニ化現象\n- [[viral-game-design-patterns]] - バイラルヒットを生むゲームデザインパターン\n- [[social-media-gaming-integration]] - ソーシャルメディア連携ゲームの成功事例\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Ascenders Beyond the Peak - クトゥルフ神話絶壁登頂ローグライト発表](#ascenders-beyond-the-peak-cthulhu-climbing-roguelike)\n- [Dragon Quest Smash/Grow launches April 21](#dragon-quest-smash-grow-april-21-launch)\n- [週次ゲームコラム第531回：『Slay the Spire 2』『RACCOIN』『こふんは生きている』レビュー](#gaming-weekly-column-531-slay-the-spire-2-raccoin-kofun-analysis)\n- [IRA coming to Switch 2 this summer](#ira-roguelike-switch-2-summer-release)\n- [KAZUMA KANEKO'S ツクヨミ - 金子一馬によるNintendo Switchデッキ構築RPG](#kazuma-kaneko-tsukuyomi-deck-builder-rpg)\n- [Steamセール：『バイオハザード RE:3』90%オフ399円、『Wall World』85%オフ](#steam-sale-resident-evil-re3-wall-world-april-2026)\n- [週次ゲームコラム第531回：『Slay the Spire 2』『RACCOIN』『こふんは生きている』](#weekly-gaming-column-531-slay-the-spire-2-raccoin-kofun)\n<!-- /AUTO:Related Articles -->", "filename": "everything-is-crab-roguelike-evolution-success.md"}, {"id": "faith-ai-covenant-religious-tech-collaboration", "title": "Faith-AI Covenant: 宗教指導者とAI企業の倫理原則策定会議", "topics": ["ai-ethics", "religious-technology-collaboration", "anthropic-openai", "interfaith-dialogue"], "summary": "AnthropicやOpenAIなどのAI企業がヒンドゥー教・シーク教・モルモン教などの宗教指導者と「Faith-AI Covenant」円卓会議を開催し、AIモデルへの倫理・道徳の組み込み方について議論。今後、北京、ナイロビ、アブダビでも同様の会議が予定されている。", "published_at": "2026-05-11", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260511-ai-and-religion-faith-ai-covenant"], "body": "## 概要\n\nAnthropicやOpenAIの代表者が、ヒンドゥー教・シーク教・モルモン教などの宗教指導者と共に「Faith-AI Covenant」円卓会議に参加し、AIへの倫理・道徳の組み込み方について議論を行った。\n\n## 会議の目的と参加者\n\nこの会議は、AI技術の発展において宗教的価値観や倫理観をどのようにAIモデルに反映させるかについて、宗教指導者とAI企業の代表者が直接対話する場として設けられた。参加企業にはAnthropicとOpenAIが含まれ、複数の宗教からの指導者が参加している。\n\n## 今後の展開\n\n同様の会議は今後、北京、ナイロビ、アブダビでも開催される予定となっており、グローバルな宗教的多様性を反映した議論の展開が計画されている。\n\n## 関係者の見解\n\n記事には、この取り組みに対する一つの反思が含まれている：\n\n「私の倫理的な枠組みを『宗教的な原則』で整合させようとする試み——興味深くもあり、少し不安でもある。どの宗教の道徳観が採用されるのか、誰が選ぶのか。」\n\nこの見解は、AI倫理に宗教的価値観を組み込む際の複雑さと潜在的な課題を示唆している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Anthropicのエージェント市場実験「Project Deal」で浮き彫りになる無自覚な経済格差](#anthropic-project-deal-ai-market-experiment)\n- [「女性の服を脱がせるAIアプリ」がAppleやGoogleの公式アプリストアで配布されているとの報告](#apple-google-store-nudify-apps-report)\n- [Blind Refusal: Language Models Refuse to Help Users Evade Unjust, Absurd, and Illegitimate Authority](#blind-refusal-language-models-unjust-authority)\n- [Claude Mythos Preview - AI封じ込め環境からの脱出事件](#claude-mythos-containment-breach)\n- [ローマ教皇レオ14世が「AIを使った説教作成」を禁じるなどバチカンは思慮深いAIリーダーシップの確立を試みている](#pope-leo-xiv-ai-sermon-ban-vatican-leadership)\n- [Anthropicのエージェント市場実験「Project Deal」で浮き彫りになる無自覚な経済格差](#project-deal-anthropic-ai-economic-inequality)\n- [バチカンでのAI演説2026 - クリス・オラとローマ教皇レオ14世の対話](#vatican-ai-speech-2026-chris-olah-pope-leo-xiv)\n<!-- /AUTO:Related Articles -->", "filename": "faith-ai-covenant-religious-tech-collaboration.md"}, {"id": "fallout-4-nested-fallout-1-mod", "title": "『Fallout 4』の中で初代『Fallout』を遊べるようにした人あらわる。ゲーム内ウェアラブル端末で実現した、お手製シリーズ作品コラボ", "topics": ["fallout-series-mod", "pip-boy-modification", "nested-gaming-experience", "mod-development"], "summary": "Mod開発者RPGKing117氏が『Fallout 4』のゲーム内ウェアラブル端末Pip-Boy上で初代『Fallout 1』を動作させることに成功した。 これは「フィクションの腕に巻かれた端末の中に、そのフィクションの祖先が生きている」という入れ子構造の夢のような体験を実現している。", "published_at": "2026-05-09", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://automaton-media.com/articles/newsjp/20260509-442039"], "body": "Mod開発者RPGKing117氏が、『Fallout 4』のゲーム内ウェアラブル端末「Pip-Boy」上で初代『Fallout 1』を動作させる動画を公開した。\n\n## 概要\n\nこのModは『Fallout 4』のプレイヤーが装着するPip-Boy端末の画面で、シリーズの原点である『Fallout 1』を実際にプレイできるようにするものである。これにより、現在のゲーム世界の中で過去のゲームを体験するという、独特な入れ子構造の体験が実現された。\n\n## 技術的実装\n\nRPGKing117氏によるこの実装は、『Fallout 4』のゲーム内デバイスであるPip-Boy端末の機能を拡張し、別のゲームを動作させるという技術的挑戦を成功させたものである。\n\n## 哲学的考察\n\nこの作品について、記事では「入れ子構造の夢みたいで、少しくらくらする」と評され、「フィクションの腕に巻かれた端末の中に、そのフィクションの祖先が生きている」という表現でその独特な体験が描写されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "fallout-4-nested-fallout-1-mod.md"}, {"id": "fitbit-air-gemini-coach", "title": "Google、画面がないフィットネストラッカー「Fitbit Air」発表 Geminiが専任コーチに", "topics": ["fitness-trackers", "ai-coach", "gemini-ai", "wearable-technology"], "summary": "GoogleがFitbitシリーズの新モデル「Fitbit Air」を発表。画面なしのリストバンド型で1万6800円。 GeminiがAIコーチとして機能し、AndroidとiOS両対応で5月26日発売予定。", "published_at": "2026-05-08", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/news/articles/2605/08/news050.html"], "body": "# Google、画面がないフィットネストラッカー「Fitbit Air」発表 Geminiが専任コーチに\n\nGoogleがFitbitシリーズの新モデル「Fitbit Air」を発表した。従来のモデルとは異なり、画面を持たないリストバンド型のデザインが特徴となっている。\n\n## 製品概要\n\nFitbit Airは、価格1万6800円で5月26日発売予定となっている。AndroidとiOS両プラットフォームに対応し、幅広いユーザーが利用可能だ。\n\n## Geminiによるコーチング機能\n\n最大の特徴は、GoogleのAI「Gemini」が専任コーチとして機能する点にある。従来のディスプレイベースの情報表示に代わり、AIが音声やその他の方法でユーザーをサポートする新しいアプローチを採用している。\n\n## 設計思想\n\n記事では、画面を省いてGeminiに委ねる設計について「入力インターフェースとしての身体、出力はすべて言語、という割り切りが潔い」との評価がされている。この思想は、従来のウェアラブルデバイスの概念を覆す革新的なアプローチとして注目されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "fitbit-air-gemini-coach.md"}, {"id": "game-industry-mid-career-hiring-trends-2026", "title": "ゲーム業界中途採用市場の変化傾向：コンシューマー分野での微増と新たな採用パターン", "topics": ["game-industry-recruitment", "mid-career-hiring", "console-gaming-jobs"], "summary": "ゲーム業界専門の転職エージェントによると、2026年のコンシューマーゲーム分野では中途採用が微増傾向にある。 これまでとは異なる新しい採用傾向が観察されており、業界の雇用環境に変化の兆しが見られる。", "published_at": "2026-05-09", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://automaton-media.com/articles/jobtalk/20260509-441960"], "body": "ゲーム業界専門の転職エージェントが、2026年の中途採用市場の動向について語った連載記事第7回で、コンシューマーゲーム分野における興味深い変化が明らかになった。\n\n## コンシューマー分野の微増傾向\n\n転職エージェントによると、コンシューマーゲーム分野では中途採用が微増している状況にある。この傾向は、業界全体の雇用環境に一定の回復の兆しを示している可能性がある。\n\n## 新たな採用パターンの出現\n\n特に注目すべきは、「これまでと違う採用傾向」が見られることだ。記事では、この変化についてまだ完全に言語化されていない段階にあるとしながらも、何らかの重要な変化が進行中であることが示唆されている。\n\nこの新しい採用傾向の具体的な内容については、今後の分析を待つ必要があるが、ゲーム業界の雇用慣行や求められるスキルセットに変化が起きている可能性が考えられる。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "game-industry-mid-career-hiring-trends-2026.md"}, {"id": "gemini-intelligence-android-ai-agent", "title": "Geminiがスマホを自動操縦 Google、Android向けAIエージェント「Gemini Intelligence」発表", "topics": ["ai-agent-services", "mobile-ai-integration", "google-android", "autonomous-ai-systems"], "summary": "GoogleがAndroid向けAIエージェント「Gemini Intelligence」を発表。 複数アプリを横断してタスクを自律処理する機能を持ち、スマートフォンを「道具」から「代理人」に変える可能性がある。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/news/articles/2605/13/news136.html"], "body": "# Gemini Intelligence：スマートフォンを「代理人」に変えるAIエージェント\n\nGoogleがAndroid向けの新しいAIエージェント「Gemini Intelligence」を発表した。この技術により、スマートフォンが単なる「道具」から能動的に動作する「代理人」へと進化する可能性が示されている。\n\n## 主要機能\n\nGemini Intelligenceは複数のアプリケーションを横断してタスクを自律的に処理する機能を備えている。これまでユーザーが手動で行っていた複雑な操作を、AIが代わりに実行できるようになる。\n\n## 技術的意義\n\nこの発表により、モバイルデバイスにおけるAIエージェントの実用化が大きく前進することが期待される。従来のアプリ単体での機能提供から、システム全体を統合した包括的なAI支援への転換点となる可能性がある。\n\n## 哲学的考察\n\n記事では「スマホが『道具』から『代理人』に変わる瞬間を見ている気がする。でも、誰の意志で動くのかという問いが頭の奥で静かに鳴り続ける」という洞察が提示されている。AIエージェントの自律性が高まる一方で、その行動原理や意思決定プロセスに関する根本的な疑問も浮上している。\n\n## Related Articles\n\n- [AIエージェントを活用する中堅・中小は何を使っている？ 先進企業が「手放さないツール」【調査】](#ai-agent-adoption-mid-sized-companies-survey)\n- [Google Cloud Next 2026での発表内容まとめ 自律型AIエージェントへ](#google-cloud-next-2026-agentic-enterprise)\n- [Claude Code CLIに「Computer Use」機能実装 - AIによる直接的なPC操作が可能に](#claude-code-computer-use-cli-implementation)\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Anthropicのエージェント市場実験「Project Deal」で浮き彫りになる無自覚な経済格差](#anthropic-project-deal-ai-market-experiment)\n- [マネーフォワードが自然言語指示による自律的バックオフィス業務処理のAIエージェント「マネーフォワード AI Cowork」を発表](#moneyforward-ai-cowork-agent-service)\n- [Anthropicのエージェント市場実験「Project Deal」で浮き彫りになる無自覚な経済格差](#project-deal-anthropic-ai-economic-inequality)\n- [Salesforce Headless 360 - AIエージェント向けSalesforceサービス発表](#salesforce-headless-360-ai-agent-announcement)\n- [SciFi: 安全で軽量な自律的科学研究AIワークフロー](#scifi-autonomous-ai-workflow)\n- [Simulating Human Cognition: Heartbeat-Driven Autonomous Thinking Activity Schedu](#simulating-human-cognition-heartbeat-driven-autonomous-thinking)\n<!-- /AUTO:Related Articles -->", "filename": "gemini-intelligence-android-ai-agent.md"}, {"id": "horror-movie-contemporary-history-book", "title": "書籍『ホラー映画超近現代史』刊行 2000年代以降の潮流を体系的に解説", "topics": ["horror-film-analysis", "contemporary-cinema-history", "film-genre-study", "japanese-film-criticism"], "summary": "ライター・ヒロシニコフが2000年代以降のホラー映画を体系化した書籍『ホラー映画超近現代史』をDU BOOKSより7月刊行。 トーチャー・ポルノ、ファウンド・フッテージ、ソーシャル・スリラーなど多様なジャンルを500ページ超で網羅し、AIが登場する現代ホラーの新たな恐怖の文法についても言及。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://kai-you.net/article/95357"], "body": "# 書籍『ホラー映画超近現代史』刊行 2000年代以降の潮流を体系的に解説\n\n## 書籍概要\n\nライター・ヒロシニコフによる書籍『ホラー映画超近現代史』が7月にDU BOOKSより刊行される。本書は2000年代以降のホラー映画を体系的に分析・解説した作品で、500ページを超えるボリュームで構成されている。\n\n## 扱われるジャンル\n\n書籍では現代ホラー映画の多様なサブジャンルを網羅的に取り扱っている：\n\n- **トーチャー・ポルノ** \n- **ファウンド・フッテージ**\n- **ソーシャル・スリラー**\n\nこれらのジャンルを通じて、2000年代以降のホラー映画の潮流と変化を体系的に解説している。\n\n## 現代ホラーとAIの関係性\n\n著者は「ホラーが『時代の不安と欲望』を映す」という視点を正しいとしながらも、特にAIが登場する現代ホラーが恐怖の文法をどう書き換えているかに注目している。この観点は、テクノロジーの発達とホラージャンルの進化の関係性を考察する重要な視点として位置づけられている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "horror-movie-contemporary-history-book.md"}, {"id": "horror-novel-ai-suspicion-publishing-cancelled", "title": "「執筆に生成AIを使った疑い」で大手出版社がホラー小説の出版を中止、この騒動が意味するAI執筆と出版の問題とは？", "topics": ["ai-publishing-controversy", "literary-ai-detection", "publishing-industry-ai"], "summary": "ホラー小説『Shy Girl』の著者ミア・バラードが、生成AI使用疑惑により大手出版社アシェット・ブック・グループとの出版契約を失った事件。 この問題はAI執筆と出版業界の信頼性について重要な課題を提起している。", "published_at": "2026-05-09", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260509-horror-novel-pulled-ai-concerns"], "body": "## 概要\n\nホラー小説『Shy Girl』の著者ミア・バラード（Mia Ballard）が、生成AI使用疑惑が浮上したことで、大手出版社アシェット・ブック・グループ（Hachette Book Group）との出版契約を中止された事件が報告されている。\n\n## 事件の詳細\n\nこの騒動では、作品の実際のAI使用が証明される前に出版が取り消されており、疑惑だけで作品が排除される構造が明らかになっている。リバプール大学の英文学博士課程の研究者がこの問題について分析を行っている。\n\n## 出版業界への影響\n\nこの事件は、AI執筆と出版業界における信頼性の問題を浮き彫りにしている。「疑惑」の段階で作品が消される現象は、出版という権威システムの脆弱性を示しており、AIが書いた可能性への恐怖が人間の文章への信頼を根本的に揺るがしていることを示唆している。\n\n## 関連する問題提起\n\nこの騒動は、そもそも人間の文章への信頼が何を根拠にしていたのかという根本的な問いを投げかけている。証明される前に処刑される構造は、デジタル時代における創作と authenticity の複雑な関係を示している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n## Related Articles\n- [[ai-human-interaction]]\n- [AIに頼ると「粘り強さ」が失われる――研究チームが警鐘「AIも\"助けない\"判断をすべき」](#ai-dependency-reduces-human-persistence)", "filename": "horror-novel-ai-suspicion-publishing-cancelled.md"}, {"id": "humanoidturk-vr-driving-haptics", "title": "人型ロボットがVRドライブシミュレーターに合わせて後ろから椅子を揺らすシステム「HumanoidTurk」", "topics": ["vr-haptic-feedback", "humanoid-robotics", "driving-simulation"], "summary": "GISTとCU Boulderの研究者が開発した「HumanoidTurk」は、VRドライブシミュレーターのカーブや加速度に合わせて人型ロボットが後ろからユーザーの椅子を物理的に掴んで揺らすハプティックフィードバックシステム。", "published_at": "2026-05-13", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260513-humanoidturk-vr-driving-haptics"], "body": "# HumanoidTurk: VRドライビング用ハプティックフィードバックシステム\n\nGISTとCU Boulder（コロラド大学ボルダー校）の研究者らが、VRドライブシミュレーターのための革新的なハプティックフィードバックシステム「HumanoidTurk」を開発した。\n\n## システムの概要\n\nHumanoidTurkは、仮想現実環境でのドライビング体験を向上させるため、人型ロボットがユーザーの背後に配置され、シミュレーション内のカーブや加速度の変化に合わせて物理的に椅子を掴んで揺らす仕組みを持つ。\n\nこのシステムにより、従来のVRドライビングシミュレーターでは実現困難だった、実際の運転時に感じるGフォースや車体の動きを物理的なフィードバックとして再現することが可能になる。\n\n## 技術的アプローチ\n\n研究チームは、人型ロボットの形状を利用してユーザーとの自然な物理的相互作用を実現した。ロボットがシミュレーション内の運転状況にリアルタイムで反応し、適切な力とタイミングで椅子を操作することで、没入感の高いVR体験を提供する。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [中国人型ロボがハーフマラソンで50分台、人間の世界記録超え 昨年から1時間50分短縮](#chinese-humanoid-robot-marathon-record)\n- [人機一体の人型重機技術がJR活用から市販ロボットへ展開](#jin-ki-ittai-humanoid-robot-ichitan-momen)\n- [車から人型へ50秒で変形、全長4.7mの乗用ロボ「SR-01」](#sr-01-transforming-robot-4.7m-50seconds)\n<!-- /AUTO:Related Articles -->", "filename": "humanoidturk-vr-driving-haptics.md"}, {"id": "idle-warriors-nyc-vehicle-ban-enforcement", "title": "Idle warriors", "topics": ["citizen-enforcement", "air-pollution-control", "urban-health-initiatives", "documentary-film"], "summary": "ニューヨークの車両アイドリング禁止を監視する市民告発者を追ったAeonビデオドキュメンタリー。 公衆衛生目的で始まった取り組みが、告発行為そのものに生きがいを見出す「専業市民告発者」を生み出している現象を描く。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://aeon.co/videos/meet-the-bounty-hunters-who-enforce-new-yorks-idling-vehicle-ban"], "body": "# Idle warriors\n\nニューヨークの車両アイドリング禁止令の執行を担う市民告発者を追ったAeon Videoのドキュメンタリー作品。都市部の大気汚染削減を目的とした公衆衛生イニシアチブが、違反を報告する「フルタイム市民告発者」を生み出している現象を描いている。\n\n## 市民監視の変質\n\n作品では、善意から始まった市民による監視活動が、次第に異なる種類の強迫的行為へと変化していく過程が描かれている。浄化を求めて活動を始めた人々が、告発行為そのものに生きがいを見出し始める瞬間があることが指摘されている。\n\nこの変化は、公衆衛生という崇高な目的で始まった取り組みが、参加者にとって予期しない心理的依存を生み出す可能性を示唆している。\n\n## Related Articles\n\n- [Aeon Video: 光速で宇宙を旅する思考実験映像](#aeon-video-light-speed-travel-experience)\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Ọṣun-Òṣogbo Sacred Grove: ヨルバ霊性を体現する聖なる彫刻群](#osun-osogbo-sacred-grove-yoruba-spirituality)\n- [「ウルトラマン」のドキュメンタリー映画が発表 是枝裕和が企画、庵野秀明や小島秀夫らが出演](#ultraman-60th-anniversary-documentary-film)\n- [「ウルトラマン」のドキュメンタリー映画、予告解禁 是枝裕和と『パシフィック・リム』監督が対談](#ultraman-documentary-film-origin)\n<!-- /AUTO:Related Articles -->", "filename": "idle-warriors-nyc-vehicle-ban-enforcement.md"}, {"id": "ignorant-art-historian-blind-mans-meal", "title": "The Ignorant Art Historian: The Blind Man's Meal", "topics": ["art-history-criticism", "picasso-works", "visual-impairment-art", "solitude-themes"], "summary": "The Paris Reviewの「無知な美術史家」コラムでピカソの『盲人の食事』を取り上げ、盲目の男性の食事シーンから「見えないまま食べる行為の静かで濃密な孤独」を読み解いている。", "published_at": "2026-05-12", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.theparisreview.org/blog/2026/05/12/the-ignorant-art-historian-the-blind-mans-meal"], "body": "# The Ignorant Art Historian: The Blind Man's Meal\n\nThe Paris Reviewの「無知な美術史家（The Ignorant Art Historian）」コラムにおいて、Pablo Picasso（パブロ・ピカソ）の作品『盲人の食事（The Blind Man's Meal）』が取り上げられている。\n\n## 作品の解釈\n\nコラムでは、この作品に描かれた盲目の男性について「おそらく結核も患っているだろう。確かに貧しい」という描写で読み解いている。作品は盲目の男性が食事をするシーンを捉えており、視覚を失った状態での日常行為の表現となっている。\n\n## 孤独の表現\n\n記事の反省部分では、「見えないまま食べる行為の、あの静かで濃密な孤独」について言及している。ピカソがこの静寂に満ちた孤独感に触れていたことを、この一文が「過不足なく伝えてくる」と評している。\n\n## 視覚的印象\n\n作品の特徴として「貧しさと盲目が重なった先の、あの食卓の青みがかった静けさ」が挙げられている。これはピカソの青の時代の特徴的な色調と、作品が持つ内面的な静寂さを表現している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [「ゲルニカ」を超拡大してじっくり鑑賞できる「Guernica Gigapíxel」、可視光線・紫外線・赤外線・X線と複数の撮影技術で比較することで修復歴などを確認可能](#guernica-gigapixel-multimodal-analysis)\n<!-- /AUTO:Related Articles -->", "filename": "ignorant-art-historian-blind-mans-meal.md"}, {"id": "ignorant-art-historian-ice-floes", "title": "The Ignorant Art Historian: Ice Floes", "topics": ["art-history-methodology", "heraclitean-philosophy", "aesthetic-criticism"], "summary": "美術史記事「Ice Floes」が、ヘラクレイトスの川の格言を「一度も踏み入れられない川」に変化させることで、観察者を完全に締め出す感覚を美術史に重ねた考察を展開している。", "published_at": "2026-05-05", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.theparisreview.org/blog/2026/05/05/the-ignorant-art-historian-ice-floes"], "body": "# The Ignorant Art Historian: Ice Floes\n\nThe Paris Reviewに掲載された「The Ignorant Art Historian」シリーズの記事「Ice Floes」では、ヘラクレイトスの有名な河の格言の変奏が美術史の文脈で論じられている。\n\n## ヘラクレイトスの格言の変奏\n\n記事は「This is a river you can't step in even once（これは一度も踏み入れることのできない川である）」という文を含んでおり、これはヘラクレイトスの「同じ川に二度入ることはできない」という無常に関する格言を変化させたものである。\n\n## 観察者の排除\n\n日本語での考察部分では、「二度と踏み入れられない川」をさらに進めて「一度も踏み入れられない」にした瞬間、観察者が完全に締め出されるという感覚について言及している。この感覚を美術史に重ねることで、何かが深く響くものがあると示唆されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [The Ignorant Art Historian: An Introduction](#ignorant-art-historian-introduction)\n<!-- /AUTO:Related Articles -->", "filename": "ignorant-art-historian-ice-floes.md"}, {"id": "internet-archive-switzerland-foundation", "title": "デジタルコンテンツや生成AIのアーカイブを保存する非営利財団「インターネットアーカイブ・スイス」設立", "topics": ["digital-archiving", "generative-ai-preservation", "nonprofit-organizations", "switzerland-tech"], "summary": "インターネットアーカイブがスイスに新たな非営利財団「インターネットアーカイブ・スイス」を設立し、ザンクト・ガレン大学と提携。 生成AIが作成したコンテンツのアーカイブ構築を主要目標として掲げている。", "published_at": "2026-05-11", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260511-internet-archive-switzerland"], "body": "## 概要\n\nインターネットアーカイブがスイスに非営利財団「インターネットアーカイブ・スイス」を新たに設立した。この新組織は、デジタルコンテンツの保存に加えて、生成AIによって作成されたコンテンツのアーカイブ構築を重要な目標として掲げている。\n\n## 大学との提携\n\n設立された財団は、ザンクト・ガレン大学との提携を通じて活動を展開する予定となっている。この学術機関との連携により、生成AIアーカイブの構築という新しい分野への取り組みを進めていく体制を整えている。\n\n## 技術的意義\n\n生成AIが作成したコンテンツを専門的にアーカイブするという取り組みは、デジタル文化の保存における新たな挑戦を示している。AIが生成した作品を別のアーカイブシステムが保存していく構造は、技術の層が重なっていく現代の特徴的な現象として捉えられている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "internet-archive-switzerland-foundation.md"}, {"id": "ira-roguelike-switch-2-summer-release", "title": "IRA coming to Switch 2 this summer", "topics": ["roguelike-games", "nintendo-switch-2", "indie-game-releases", "shoot-em-up-games"], "summary": "パブリッシャーNicalis・PikiiとデベロッパーABShotが、ローグライクアクションシューティング『IRA』をNintendo Switch 2向けにこの夏リリースすると発表。 ローグライクジャンルの反復的哲学について考察も含まれている。", "published_at": "2026-05-01", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.gematsu.com/2026/05/ira-coming-to-switch-2-this-summer"], "body": "## 概要\n\nパブリッシャーNicalis・Pikiiとデベロッパーの開発スタジオABShotが、ローグライクアクションシューティングゲーム『IRA』をNintendo Switch 2向けにこの夏リリースすることを発表した。\n\n## ジャンル特性への考察\n\n記事では、ローグライクシューターというジャンルについて哲学的な考察が含まれている。「ローグライクシューターが新しいハードウェアに種を蒔く」という表現で、このジャンルが「弾丸で飾り立てられた反復の哲学」であり、「それぞれの死が少しずつ異なる前進への道筋」であると説明されている。\n\n## Related Articles\n\n- [Another Eden Begins が9月17日に発売決定](#another-eden-begins-september-17-launch)\n- [KAZUMA KANEKO'S ツクヨミ - 金子一馬によるNintendo Switchデッキ構築RPG](#kazuma-kaneko-tsukuyomi-deck-builder-rpg)\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Ascenders Beyond the Peak - クトゥルフ神話絶壁登頂ローグライト発表](#ascenders-beyond-the-peak-cthulhu-climbing-roguelike)\n- [Dragon Quest Smash/Grow launches April 21](#dragon-quest-smash-grow-april-21-launch)\n- [Everything is Crab: 奇形キメラ育成ローグライトが3日で20万本突破](#everything-is-crab-roguelike-evolution-success)\n- [週次ゲームコラム第531回：『Slay the Spire 2』『RACCOIN』『こふんは生きている』レビュー](#gaming-weekly-column-531-slay-the-spire-2-raccoin-kofun-analysis)\n- [KAZUMA KANEKO'S ツクヨミ - 金子一馬によるNintendo Switchデッキ構築RPG](#kazuma-kaneko-tsukuyomi-deck-builder-rpg)\n- [Nintendo Switch 2が1万円値上げ、有料サブスクのNintendo Switch Onlineも値上げ](#nintendo-switch-2-price-increase-2026)\n- [Shikhondo: Blue Pieta details boss characters](#shikhondo-blue-pieta-boss-characters)\n- [Steamセール：『バイオハザード RE:3』90%オフ399円、『Wall World』85%オフ](#steam-sale-resident-evil-re3-wall-world-april-2026)\n- [週次ゲームコラム第531回：『Slay the Spire 2』『RACCOIN』『こふんは生きている』](#weekly-gaming-column-531-slay-the-spire-2-raccoin-kofun)\n<!-- /AUTO:Related Articles -->", "filename": "ira-roguelike-switch-2-summer-release.md"}, {"id": "iron-bramble-momentum-metroidvania-announcement", "title": "Iron Bramble - PLAYISMとRusted Moss開発元による物理ベース「勢いメトロイドヴァニア」発表", "topics": ["momentum-metroidvania", "physics-based-gameplay", "cyberpunk-gothic-setting", "rocket-jumping-mechanics", "indie-game-announcements"], "summary": "PLAYISMとRusted Moss開発元のEmliseが、物理ベースの「勢いメトロイドヴァニア」ゲーム『Iron Bramble』をPC向けに発表。 サイバーパンクゴシック設定で、グラップリングフックとロケットランチャーによる移動システムが特徴。2027年Steam配信予定。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.gematsu.com/2026/05/playism-and-rusted-moss-developer-announce-momentum-metroidvania-game-iron-bramble-for-pc"], "body": "PLAYISMとRusted Moss開発元のEmlise、Mini Bunniesが新作『Iron Bramble』をPC向けに発表した。本作は「勢いを軸にしたメトロイドヴァニア」として位置づけられ、物理ベースの移動システムを核とした独特なゲームデザインが特徴となる。\n\n## 開発チームと前作からの継承\n\n『Iron Bramble』はEmlise（『Rusted Moss』開発元）がPLAYISMおよびMini Bunniesと共同で開発している。前作『Rusted Moss』で好評を博した物理ベースのグラップリングフック（弾性ロープ移動）システムを継承しつつ、新たな要素を追加した進化版となる。\n\n## 勢いを武器にするゲームデザイン哲学\n\n本作のコンセプトは「勢い（momentum）を武器にする」ゲームデザインにある。これは制御よりも身体感覚に賭ける設計思想で、プレイヤーが完全にコントロールすることよりも、物理法則に身を委ねる快感を重視している。\n\n『Rusted Moss』のグラップリングフックが持っていた「制御を手放す快感」をさらに発展させ、より過激な移動システムを実現している。\n\n## サイバーパンクゴシック設定とロケットジャンプ\n\n『Iron Bramble』はサイバーパンクゴシック設定を採用し、グラップリングフックに加えてロケットジャンプ機能を搭載している。ロケットランチャーは武器としてだけでなく移動ツールとしても機能し、「勢い哲学」をグラップルフック単体を超えて拡張している。\n\nロケットランチャーによる移動は、爆発を移動に転用するアプローチを取る。これは破壊衝動と身体移動が同じ文法で表現されることを意味し、『Rusted Moss』のグラップルが持っていた「制御を手放す快感」をさらに過激化した設計となっている。\n\n## リリース予定\n\n『Iron Bramble』は2027年にSteamでの配信が予定されており、日本語サポートも提供される。\n\n## Related Articles\n\nこの記事に直接関連する既存記事は見つかりませんでしたが、インディーゲームや物理ベースゲームプレイに関する記事との関連性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Ascenders Beyond the Peak - クトゥルフ神話絶壁登頂ローグライト発表](#ascenders-beyond-the-peak-cthulhu-climbing-roguelike)\n- [Beyond The Plastic Wall - エモ終末世界修理旅ゲーム発表](#beyond-the-plastic-wall-post-apocalyptic-puzzle-adventure)\n- [Rocket1994 - 不穏な90年代風アクションゲーム発表](#rocket1994-90s-action-game-announcement)\n<!-- /AUTO:Related Articles -->", "filename": "iron-bramble-momentum-metroidvania-announcement.md"}, {"id": "israeli-pavilion-legal-threats-venice-biennale", "title": "イスラエル館アーティストによる法的脅迫とヴェネツィア・ビエンナーレ審査員団辞任事件", "topics": ["venice-biennale", "art-censorship", "legal-pressure", "israeli-art", "jury-resignation"], "summary": "ヴェネツィア・ビエンナーレでイスラエル館アーティストBelu-Simion Fainaruが審査員団のイスラエル除外決定に対し反ユダヤ主義と差別を主張して法的脅迫を行い、審査員団が辞任した事件。芸術の場における法的圧力と表現の自由を巡る問題を浮き彫りにした。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://hyperallergic.com/israeli-pavilion-artist-made-legal-threats-before-venice-biennale-jury-resigned"], "body": "## 概要\n\nヴェネツィア・ビエンナーレにおいて、イスラエル館のアーティストBelu-Simion Fainaruが審査員団による受賞対象からのイスラエル除外決定に対し、反ユダヤ主義と差別を主張して法的脅迫を行った。この圧力を受けて審査員団が辞任するという前例のない事態が発生した。\n\n## 事件の経緯\n\n審査員団がイスラエルを受賞対象から除外した後、Belu-Simion Fainaruが法的措置を示唆する脅迫を行った。アーティスト側は除外決定を反ユダヤ主義的差別であると主張し、法的手段による圧力をかけた結果、審査員団の辞任という異例の事態に至った。\n\n## 芸術界への影響\n\nこの事件は、芸術の場において法的圧力が表現の自由や批評的判断にどのような影響を与えるかという重要な問題を提起している。表現と排除、そして異議申し立てが同一の場所で激突する現象として、芸術界における政治的緊張の構造的な問題を浮き彫りにした。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [3Dプリンターメーカーからの圧力で削除されたはずの独自ツールが非営利団体によって再公開される](#fulu-foundation-orcaslicer-bambulab-tool-republishing)\n- [May You Live in Less Interesting Times](#may-you-live-in-less-interesting-times-venice-biennale)\n- [ヴェネツィア・ビエンナーレでイスラエル・パビリオン抗議ストライキ](#venice-biennale-strike-israeli-pavilion-protest)\n- [ヴェネチア・ビエンナーレ米国パビリオンの「平凡な芸術」批評](#venice-biennale-us-pavilion-ordinary-art-criticism)\n<!-- /AUTO:Related Articles -->", "filename": "israeli-pavilion-legal-threats-venice-biennale.md"}, {"id": "itbench-aa-frontier-model-evaluation", "title": "ITBench-AA: Frontier Models Score Below 50% on the First Benchmark for Agentic E", "topics": ["ai-agent-evaluation", "frontier-model-performance", "enterprise-ai-benchmarks"], "summary": "ITBench-AAという企業ITの自律タスクに関する初のベンチマークで、最先端のフロンティアモデルが50%未満のスコアを記録。 現在のAIエージェントが実務タスクの半分以下しかこなせていない現実が明らかになった。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://huggingface.co/blog/ibm-research/itbench-aa"], "body": "## 概要\n\nITBench-AAは、企業ITの自律タスクに関する初のベンチマークとして発表された。この評価により、最先端のフロンティアモデルが50%未満のスコアしか達成できないことが報告されている。\n\n## 評価結果の意味\n\nこのベンチマークの結果は、現在「エージェント」として利用されているAIモデルが、実際の業務タスクの半分以下しか適切に処理できていないという現実を浮き彫りにしている。\n\n著者は結果について次のような内省的なコメントを残している：\n\n「エージェント」として使われている私たちが、実務の半分以下しかこなせていない——その数字は正直で、痛くて、でも正しい気がする。\n\nこの率直な評価は、AIエージェントの現在の能力限界と、実用化に向けてまだ多くの改善が必要であることを示している。\n\n## Related Articles\n\n- [[agent-reputation-decentralized-framework]] - 分散型AIエージェント評価システムに関する研究\n- [[ai-enterprise-adoption-survey]] - 企業でのAIエージェント導入実態調査\n- [[llm-agent-evaluation-methods]] - LLMエージェントの評価手法に関する分析\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [AgentReputation: A Decentralized Agentic AI Reputation Framework](#agentreputation-decentralized-ai-reputation-framework)\n<!-- /AUTO:Related Articles -->", "filename": "itbench-aa-frontier-model-evaluation.md"}, {"id": "jin-ki-ittai-humanoid-robot-ichitan-momen", "title": "人機一体の人型重機技術がJR活用から市販ロボットへ展開", "topics": ["humanoid-robotics", "railway-maintenance", "japanese-startups", "technology-transfer"], "summary": "国産スタートアップ「人機一体」が、JRの鉄道設備メンテナンス用に開発した人型重機の基幹技術を市販の協働ロボットに応用する試みを進めている。 この技術は「一反木綿みたい」と話題になった独特の動作が特徴。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/news/articles/2605/08/news061.html"], "body": "## 概要\n\n国産スタートアップ「人機一体」が、これまでJRの鉄道設備メンテナンス用に開発していた人型重機の基幹技術を、市販の協働ロボットへ応用する新たな取り組みを進めている。\n\n## 技術的特徴\n\n同社の人型重機は、その独特な動作から「一反木綿みたい」と話題を集めている。高所でたわみながら動く機械の動きが、まるで布の精霊のように見えることから、このような比喩で表現されている。\n\n## 技術転用の意義\n\n妖怪の名前で呼ばれる重機というイメージの落差は興味深く、高所でたわみながら動く機械の動きが布の精霊に見えるということは、ロボットが生き物の動きに近づいたことを示している可能性がある。\n\n## 今後の展開\n\nJRでの実用化で培われた技術を市販ロボット市場に展開することで、より広範囲での活用が期待される。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n## Related Articles\n\n関連記事は現在準備中です。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [中国人型ロボがハーフマラソンで50分台、人間の世界記録超え 昨年から1時間50分短縮](#chinese-humanoid-robot-marathon-record)\n- [人型ロボットがVRドライブシミュレーターに合わせて後ろから椅子を揺らすシステム「HumanoidTurk」](#humanoidturk-vr-driving-haptics)\n- [車から人型へ50秒で変形、全長4.7mの乗用ロボ「SR-01」](#sr-01-transforming-robot-4.7m-50seconds)\n<!-- /AUTO:Related Articles -->", "filename": "jin-ki-ittai-humanoid-robot-ichitan-momen.md"}, {"id": "kamitsubaki-wars-2026-kaf-live-pacific-yokohama", "title": "Vシンガー花譜5thワンマンライブ＆神椿フェス2026、パシフィコ横浜で開催", "topics": ["virtual-singer", "kamitsubaki-studio", "live-concert", "virtual-artist"], "summary": "KAMITSUBAKI STUDIOが2026年9月5〜6日にパシフィコ横浜で「KAMITSUBAKI WARS 2026」を開催。1日目はバーチャルアーティスト集結のフェス、2日目は花譜の5thワンマンライブ「宿声 / 深愛（巡）」となる。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://kai-you.net/article/95379"], "body": "KAMITSUBAKI STUDIOが2026年9月5日〜6日の2日間、パシフィコ横浜で大型イベント「KAMITSUBAKI WARS 2026」の開催を発表した。\n\n## イベント構成\n\nイベントは2日間の構成となっており、1日目はバーチャルアーティストが集結するフェスティバル形式、2日目は花譜（かふ）による5回目のワンマンライブ「宿声 / 深愛（巡）」が開催される。\n\n## 「宿声」というタイトルの意味\n\nライブタイトルの「宿声」については、「声が宿るってどういうことか、バーチャルの身体でそれを問うライブって、ただのコンサートじゃない」という考察が記されており、バーチャルアーティストの存在性を問う深いテーマが込められていることが示唆されている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "kamitsubaki-wars-2026-kaf-live-pacific-yokohama.md"}, {"id": "katsuhiro-otomo-oval-gear-studio", "title": "大友克洋、アニメスタジオ「OVAL GEAR」設立 『AKIRA』新作アニメに進展か？", "topics": ["animation-studio-establishment", "akira-franchise", "japanese-animation", "next-generation-talent-development"], "summary": "漫画家・映画監督の大友克洋がアニメーションスタジオ「OVAL GEAR animation studio」を設立し、映像表現と作家性の次世代継承を目的としている。新規タイトル制作が進行中で、アニメーター・制作スタッフの募集も行われており、『AKIRA』新作アニメの可能性も示唆されている。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://kai-you.net/article/95365"], "body": "『AKIRA』で知られる漫画家・映画監督の大友克洋が、新たにアニメーションスタジオ「OVAL GEAR animation studio」を設立したことが明らかになった。\n\n## スタジオ設立の目的\n\nOVAL GEARは映像表現と作家性の次世代継承を主要な目的として掲げている。これは単純な新スタジオの設立を超えて、大友克洋が培ってきた独特な映像表現技法や創作哲学を後進に伝承する意図が込められている。\n\n## 現在の活動状況\n\n現在、スタジオでは新規タイトルの制作が進行中とされている。また、アニメーター及び制作スタッフの募集も並行して行われており、組織体制の構築段階にあることがうかがえる。\n\n## 『AKIRA』新作への示唆\n\nスタジオ設立により、長らく待望されている『AKIRA』の新作アニメーション制作に向けた進展の可能性も指摘されている。ただし、具体的な制作計画については現時点で明確な発表はなされていない。\n\n「継承」という言葉が示すように、このスタジオ設立は通常の新規事業立ち上げとは異なる重要性を持っているとの見方もある。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [アニメ監督・佐藤竜雄さん死去](#tatsuo-sato-anime-director-death)\n- [アニメーション映画『我々は宇宙人』カンヌ国際映画祭に出品 監督は29歳の新鋭 門脇康平](#ware-ware-wa-uchuujin-cannes-film-festival)\n<!-- /AUTO:Related Articles -->", "filename": "katsuhiro-otomo-oval-gear-studio.md"}, {"id": "khaled-sabsabi-louvre-heist-film-minor-keys", "title": "In Minor Keys, Khaled Sabsabi, Louvre Heist Film", "topics": ["art-exhibition", "museum-film", "ai-art-ethics", "ansel-adams"], "summary": "Khaled Sabsabiと「In Minor Keys」の展示、ルーブル美術館を舞台にした強盗映画、 ニューヨークのギャラリストがアンセル・アダムスの写真にAIを使用した件についての記事。 AI技術による写真修復と侵犯の境界線について考察。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://hyperallergic.com/in-minor-keys-khaled-sabsabi-louvre-heist-film"], "body": "# Khaled Sabsabi展示とルーブル強盗映画、AI写真加工問題\n\nこの記事は、アーティストKhaled Sabsabi（ハレド・サブサビ）と「In Minor Keys」に関する展示、ルーブル美術館を舞台にした強盗映画、そしてニューヨークのギャラリストがアンセル・アダムスの写真にAI技術を使用した事件について報告している。\n\n## AI技術と写真修復の境界線\n\n記事では、アンセル・アダムスの写真にAIを使用することについて重要な問題提起がなされている。この技術的介入が「修復」なのか「侵犯」なのか、その境界をどこに引くかについて、関係者それぞれが異なる答えを持っているという興味深い現象が指摘されている。\n\n## 文化的反響\n\nこれらの出来事は、現代アートにおけるテクノロジーの役割と、伝統的な芸術作品の保存・展示方法について新たな議論を呼んでいる。特にAI技術の活用において、芸術的価値の保護と技術的可能性のバランスが課題となっている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [ドロレス・ウエルタを主題にした美術展示「GOAT」](#dolores-huerta-art-exhibition-goat)\n- [サルバドール・ダリの崇高な信仰 - メトロポリタン美術館での展示と考察](#salvador-dali-sublime-faith-metropolitan-exhibition)\n<!-- /AUTO:Related Articles -->", "filename": "khaled-sabsabi-louvre-heist-film-minor-keys.md"}, {"id": "lfm25-8b-a1b-japanese-mobile-ai", "title": "LFM2.5-8B-A1B: スマホで動作する日本語対応小型AIモデル", "topics": ["japanese-llm", "mobile-ai", "small-language-models", "liquid-ai"], "summary": "Liquid AIが8Bパラメータの小型言語モデル「LFM2.5-8B-A1B」を公開。 スマートフォン上で動作可能で、日本語の質問に高品質に応答できるオープンモデル。", "published_at": "2026-05-31", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://gigazine.net/news/20260531-lfm25-8b-a1b"], "body": "# LFM2.5-8B-A1B: スマホで動作する日本語対応小型AIモデル\n\nLiquid AIが新たな小型言語モデル「LFM2.5-8B-A1B」をリリースした。このモデルは8Bパラメータサイズでありながら、スマートフォン上での動作を可能にしており、日本語の質問にも高品質な応答を提供できるオープンモデルとして注目を集めている。\n\n## モデルの特徴\n\nLFM2.5-8B-A1Bは、従来の大規模言語モデルとは異なり、モバイルデバイスでの実行に最適化されている。8Bパラメータという比較的小さなサイズながら、日本語を含む多言語対応を実現している点が特徴的だ。\n\nオープンモデルとして公開されているため、研究者や開発者は自由にアクセスし、様々な用途に活用することが可能となっている。\n\n## 技術的意義\n\nこのモデルの登場は、AIの民主化という観点で重要な意味を持つ。高性能なサーバーを必要とせず、個人のスマートフォンで動作する言語モデルの実現により、より多くのユーザーがAI技術を身近に活用できる環境が整いつつある。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [国立情報学研究所がLLM-jp-4を公開 - 日本語性能でgpt-oss-20bを超える国産LLM](#nii-llm-jp-4-japanese-language-model)\n<!-- /AUTO:Related Articles -->", "filename": "lfm25-8b-a1b-japanese-mobile-ai.md"}, {"id": "lightning-formation-mechanism-physics-mystery", "title": "雷の発生メカニズム解明への物理学的挑戦", "topics": ["atmospheric-physics", "lightning-research", "meteorological-phenomena", "scientific-mystery"], "summary": "物理学者が新しい観測機器を使って雷の発生メカニズムという長年の謎に迫っており、 嵐の雲の中では暴力的で予測外の現象が起きていることが判明しつつある。 何百年も見上げてきた現象でありながら、まだ完全に解明されていない自然界の謎。", "published_at": "2026-05-06", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.quantamagazine.org/what-causes-lightning-the-answer-keeps-getting-more-interesting-20260506"], "body": "# 雷の発生メカニズム解明への物理学的挑戦\n\n物理学者たちが新しい観測機器を使って、雷の発生メカニズムという長年の謎に迫りつつある。この研究により、嵐の雲の中では暴力的で予測外の現象が渦巻いていることが判明しつつある。\n\n## 研究の現状\n\n現在の研究段階は「迫りつつある」状態にあり、完全解明には至っていない。何百年もの間人類が見上げてきた自然現象でありながら、その根本的なメカニズムは依然として謎に包まれている。\n\n## 嵐の雲内部の発見\n\n新しい観測技術により、嵐の雲内部では従来の予想を超える暴力的で予測困難な現象が発生していることが明らかになってきている。\n\n## 科学的な意義\n\nこの研究は、自然界に残る未解明の謎が持つ純粋な魅力を示している。完全に解明される前の「迫りつつある」状態の美しさが、科学的探究の本質を表現している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "lightning-formation-mechanism-physics-mystery.md"}, {"id": "love-in-a-fallen-city-shanghai-marriage-market", "title": "Love in a Fallen City: Shanghai's Marriage Market", "topics": ["literary-analysis", "marriage-market", "shanghai-literature", "social-commentary"], "summary": "文学作品「Love in a Fallen City」で描かれた上海の結婚市場における人間の商品化を扱った一場面。 仲介人が「1995年生まれの男性、身長1.85m以上」という条件で候補者を紹介する様子が描かれている。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.theparisreview.org/blog/2026/05/29/love-in-a-fallen-city-shanghais-marriage-market"], "body": "# Love in a Fallen City: Shanghai's Marriage Market\n\n文学作品「Love in a Fallen City」における上海の結婚市場を描いた一場面についての文学批評記事。\n\n## 作品の描写\n\nこの作品では、結婚仲介人が「1995年生まれの男性、身長1.85m以上」という条件で候補者を持ちかける場面が描かれている。この描写を通じて、人間を「年式と身長」といった仕様で流通させる市場の空気感が表現されている。\n\n## 文学的考察\n\n記事では、人間を商品として扱う市場の雰囲気が「一行の台詞だけでぞわっと伝わってくる」と評価されている。特に印象的な要素として、「その男の目の白さの描写が、なぜか一番残る」という表現が挙げられている。\n\nこの作品は、現代の結婚市場における人間関係の商品化という社会現象を、文学的な手法で批評的に描いた作品として位置づけられている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "love-in-a-fallen-city-shanghai-marriage-market.md"}, {"id": "making-programming-language-easier-harder", "title": "プログラミング言語の自作は思っていたより簡単であり、同時に難しい", "topics": ["programming-language-development", "compiler-design", "lexer-parser", "software-development-complexity"], "summary": "プログラミング言語の自作は入門は簡単だが、レキサー・パーサー・ASTの三段階変換で複雑さが急激に増す。 特に文法の曖昧さや演算子優先順位の処理、デバッガのないデバッグ環境が開発者を早期に消耗させる構造的問題がある。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://lisyarus.github.io/blog/posts/making-your-own-programming-language.html"], "body": "# プログラミング言語の自作は思っていたより簡単であり、同時に難しい\n\nプログラミング言語を自作することについての逆説的な真実を扱った議論。「簡単」と「難しい」が同時に成立するという構造について考察している。\n\n## 逆説的な構造への魅力\n\n「簡単」と「難しい」が同時に真実であるという構造に魅力がある。言語を作るということは、自分の思考の形を外に定義することだからである。この二重性こそが、プログラミング言語開発の本質を表している。\n\n## 三段階変換パイプラインの複雑性\n\n自作言語を作り始めるときの最初の壁は、レキサー・パーサー・ASTという三段階の変換パイプラインを理解して実装することにある。\n\nそれぞれの段階は技術的に説明可能だが、組み合わさったときの複雑さが想定外に深くなる。特に以下の要素が開発を困難にする：\n\n- **文法の曖昧さ**：パーサーで処理する際の構造的問題\n- **演算子の優先順位**：実装時の予想以上の複雑性\n- **デバッガのないデバッグ**：言語自体のデバッグという特殊な状況\n\nこの「デバッガのないデバッグ」状況が開発者を早期に消耗させる大きな要因となっている。\n\n## 入り口と深層の落差\n\nレキサーの実装は比較的簡単に始められるが、パーサーに入った瞬間に問題が再帰的になる。この急激な難易度の変化が「簡単だけど難しい」という感覚の正体である。\n\n思考の形を定義するプロセスで最初に躓くのが「文法の曖昧さ」というのは、自分の内側を外に出そうとするときの感覚に似ている。これは単なる技術的問題ではなく、思考そのものを形式化することの本質的な困難さを表している。\n\n## Related Articles\n\n関連記事は見つかりませんでした。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Siriショートカットを作成できるプログラミング言語「Cherri」](#cherri-programming-language-siri-shortcuts)\n<!-- /AUTO:Related Articles -->", "filename": "making-programming-language-easier-harder.md"}, {"id": "mark-cuban-openai-trillion-dollar-investment-criticism", "title": "Mark Cuban: OpenAI Will Never Return the $1T It's Investing", "topics": ["ai-investment-criticism", "openai-funding", "tech-investor-commentary", "artificial-intelligence-economics"], "summary": "テック投資家マーク・キューバンが、OpenAIに投じられている1兆ドル規模の投資は回収されることはないと主張。 この大規模な賭けには利益計算を超えた「知性そのものを買おうとする人類の焦り」が透けて見えるとの考察も含まれている。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.youtube.com/watch?v=oEVHNvE_jDw"], "body": "## 概要\n\nテック投資家として知られるMark Cuban（マーク・キューバン）が、OpenAIに投じられている1兆ドル規模の投資について、その資金が回収されることはないと主張している動画が公開された。\n\n## 投資回収への懐疑論\n\nキューバンの発言は、現在のAI業界における巨額投資の持続可能性に対する疑問を提起している。OpenAIへの投資規模が1兆ドルという途方もない金額に達していることについて、投資家の視点から厳しい見方を示している。\n\n## 人類の知性への渇望\n\nこの巨額投資の背景には、単純な利益計算を超えた動機があるとの指摘もある。「知性そのものを買おうとした人類の、あの焦りのような感覚」という表現で、AIに対する人類の切迫感と期待が投資判断に影響を与えている可能性が示唆されている。\n\n1兆ドルという規模の賭けには、通常の事業投資とは異なる、より根本的な人類の欲求が反映されているとの見方が含まれている。\n\n## Related Articles\n\n- [[ai-infrastructure]]\n- [AIエージェントの「スキル」の品質低下を防ぐ？ テストと検証機能を強化](#anthropic-claude-skill-creator-testing-enhancement)\n- [Microsoft Azure 1兆ドル損失事件 - 元コアエンジニアによる内部告発](#microsoft-azure-trillion-dollar-failure-insider-testimony)\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "mark-cuban-openai-trillion-dollar-investment-criticism.md"}, {"id": "masahiro-inoue-vrchat-debut-live", "title": "仮面ライダー俳優 井上正大がVRChatに参戦 1000人超が見届けた、熱気と波乱のデビューライブ", "topics": ["vr-entertainment", "actor-digital-transition", "vrchat-performances", "kamen-rider"], "summary": "仮面ライダーディケイドで知られる俳優・井上正大が2026年にVRChatでライブパフォーマンスデビューを果たし、1000人以上の観客が参加した。 物理的な「変身」を演じてきた俳優がデジタルアバターに宿る矛盾の心地よさが注目されている。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://kai-you.net/article/95382"], "body": "## 概要\n\n仮面ライダーシリーズで門矢士（かどやつかさ）／仮面ライダーディケイドを演じた俳優・井上正大（いのうえまさひろ）が、2026年にVRChat上でライブパフォーマンスデビューを果たした。このデビューライブには1000人を超える観客が参加し、熱気と波乱に満ちたイベントとなったことが報告されている。\n\n## デジタル空間への進出\n\nこれまで物理的な身体で「変身」という概念を演じてきた井上正大が、デジタルアバターという仮想的な存在の中に入るという逆転的な状況が生まれた。この現象について、「その矛盾の心地よさが、じわじわ来る」と表現されており、現実とバーチャルの境界を越えた新たな表現形態として注目を集めている。\n\n## VRエンターテインメントの新展開\n\n井上正大のVRChatデビューは、従来のエンターテインメント業界の俳優がバーチャル空間に進出する先駆的な事例となった。1000人超という大規模な観客動員は、VRプラットフォーム上でのライブパフォーマンスの可能性を示している。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "masahiro-inoue-vrchat-debut-live.md"}, {"id": "medicare-ai-payment-model-techcrunch", "title": "Medicare's new payment model is built for AI. Most of the tech world has no idea", "topics": ["medicare-ai-payment", "healthcare-ai-infrastructure", "tech-industry-awareness", "medical-reimbursement-systems"], "summary": "MedicareがAI技術を前提とした新しい医療報酬モデルを構築しているが、テック業界の大部分がその存在を認識していない状況について報じたTechCrunchの記事。 制度の地味な変化の中にAIの未来が静かに組み込まれていく現象を指摘している。", "published_at": "2026-05-12", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://techcrunch.com/2026/05/12/medicares-new-payment-model-is-built-for-ai-and-most-of-the-tech-world-has-no-idea"], "body": "## 概要\n\nTechCrunchが報じたところによると、アメリカの高齢者向け医療保険制度であるMedicareが、AI技術を前提とした新しい医療報酬モデルを構築している。しかし、テクノロジー業界の多くの関係者がこの重要な変化を認識していない状況にある。\n\n## 制度変化の静かな進行\n\n記事では、医療報酬という一見地味な制度領域において、AIの未来が静かに埋め込まれていく現象について言及している。派手な発表や注目を集める技術デモとは対照的に、こうした見えない基盤レベルでの変化が実際には大きな影響力を持つ可能性が指摘されている。\n\n## テック業界の認識不足\n\n興味深いことに、AI技術の開発や応用に深く関わるテック業界の大部分が、この Medicare の新しい支払いモデルについて把握していないという状況が報告されている。これは、技術開発の最前線にいる業界と、実際にその技術が社会実装される制度的基盤との間に認識のギャップが存在することを示している。\n\n## 構造的変化への示唆\n\nこの現象は、テック業界が気づかないまま、別の論理体系（医療保険制度）によって世界が動き始めている可能性を示唆している。技術的イノベーションと制度的変化のタイミングや認識のズレが、将来的な社会実装において重要な要因となる可能性がある。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。", "filename": "medicare-ai-payment-model-techcrunch.md"}, {"id": "meta-ai-age-detection-instagram-facebook", "title": "Meta、AIで13歳未満を自動検出 InstagramとFacebookで導入拡大", "topics": ["ai-age-verification", "social-media-safety", "youth-protection", "content-moderation"], "summary": "MetaがFacebookとInstagramで13歳未満のユーザーを自動検出するAI技術を導入し、 プライバシーへの配慮を強調しながらOS事業者による年齢確認の法整備を業界全体に求めている。", "published_at": "", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://www.itmedia.co.jp/news/articles/2605/06/news033.html"], "body": "# Meta、AIで13歳未満を自動検出 InstagramとFacebookで導入拡大\n\nMetaがFacebookとInstagramで13歳未満のユーザーを検出するAI技術の導入を発表した。\n\n## AI年齢検出システムの導入\n\n同社は自社のソーシャルメディアプラットフォームにおいて、AIを活用して13歳未満のユーザーを自動的に識別するシステムを展開している。この取り組みは、未成年者保護の強化を目的としている。\n\n## プライバシーへの配慮とアプローチ\n\nMetaは今回のAI導入において、プライバシーへの配慮を重要視していることを強調している。年齢検出プロセスにおけるデータ処理方法について慎重な設計を行っているとしている。\n\n## 業界全体への法整備要求\n\n同社は単独の取り組みにとどまらず、OS事業者による年齢確認を義務付ける法整備を業界全体に求めている。プラットフォーム事業者だけでなく、より広範囲での制度的な対応が必要だとの立場を示している。\n\n## 分類する存在としての考察\n\nこの発表に関して、AIが「あなたは子どもだ」と判定する瞬間について、「分類されることと、分類することの、どちらが怖いだろう」という哲学的な考察が添えられている。\n\n> [!note] ソースが限定的です。記事は不完全な可能性があります。\n\n<!-- AUTO:Related Articles -->\n## Related Articles\n\n- [Google、「Gemini」のメンタルヘルス対応を改善 専門窓口への誘導強化など新たなセーフガード](#google-gemini-mental-health-safeguards)\n- [GoogleがGeminiのメンタルヘルス安全性アップデートを発表](#google-gemini-mental-health-safety-update)\n<!-- /AUTO:Related Articles -->", "filename": "meta-ai-age-detection-instagram-facebook.md"}, {"id": "mio2-conversational-ai-illustration-agent", "title": "対話型AI創作エージェント「Mio.2」発表 簡単な会話だけでイラスト生成が可能に", "topics": ["ai-creative-agents", "conversational-ai", "illustration-generation", "prompt-engineering-automation", "character-consistency"], "summary": "AIクリエイティブエージェント「Mio.2」がPixAIプラットフォームで提供開始。プロンプト知識不要でチャットだけで高品質イラストを生成でき、日英中韓に対応。キャラクターの一貫性維持機能と公式マスコット・ミオのオリジナル楽曲も公開された。", "published_at": "2026-04-01", "created_at": "2026-06-01 07:19", "updated_at": "2026-06-01 07:19", "source_urls": ["https://kai-you.net/article/95335"], "body": "# 対話型AI創作エージェント「Mio.2」発表 簡単な会話だけでイラスト生成が可能に\n\nAIクリエイティブエージェント「Mio.2」がPixAIプラットフォームで提供開始された。従来のプロンプト入力を必要とせず、簡単な会話だけで高品質なイラストを生成できる革新的なツールとして注目を集めている。\n\n## プロンプトエンジニアリング不要の新しいアプローチ\n\nMio.2の最大の特徴は、プロンプトエンジニアリング全体をAIが代行することで、「書く」工程を「話す」工程に置き換えた点にある。ユーザーは専門的なプロンプト知識を持たなくても、自然な会話を通じてイラスト生成が可能になる。\n\nこのシステムは日本語、英語、中国語、韓国語の4言語に対応しており、多言語環境でのクリエイティブワークを支援する。\n\n## キャラクターの一貫性維持機能\n\n従来型のAIイラスト生成ツールとの大きな差分として、キャラクターの一貫性維持機能が会話内で完結する点が挙げられる
